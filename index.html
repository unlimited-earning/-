<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - Unlimited Earning</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #ff007a;
            --bg: #0b0e1a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1a1c2c, #0b0e1a);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            perspective: 1000px;
        }

        .card {
            background: linear-gradient(160deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header-box { text-align: center; margin-bottom: 30px; }
        .header-box h2 { font-size: 28px; font-weight: 700; background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-box p { color: #888; font-size: 14px; margin-top: 5px; }

        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 8px; margin-left: 5px; }
        
        .input-field {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 14px 15px 14px 45px;
            border-radius: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }

        .input-group i.main-icon { position: absolute; left: 15px; top: 38px; color: #555; }
        .input-group i.toggle-pass { position: absolute; right: 15px; top: 38px; color: #555; cursor: pointer; }

        .options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 13px; }
        .remember-me { display: flex; align-items: center; cursor: pointer; color: #aaa; }
        .remember-me input { margin-right: 8px; accent-color: var(--primary); }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(to right, var(--secondary), var(--primary));
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(58, 123, 213, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(58, 123, 213, 0.4); }
        .btn:active { transform: scale(0.98); }

        .switch-form { text-align: center; margin-top: 25px; font-size: 14px; color: #aaa; }
        .switch-form span { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: underline; }

        /* Hide/Show Logic */
        #register-form { display: none; }

        /* Toast Styles */
        #toast {
            position: fixed; top: 20px; right: 20px; background: var(--accent); color: white;
            padding: 12px 25px; border-radius: 12px; font-weight: 600; display: none; z-index: 10000;
            animation: fadeInRight 0.3s ease;
        }
        @keyframes fadeInRight { from { opacity:0; transform: translateX(50px); } to { opacity:1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="toast">Error message here</div>

    <div class="auth-container">
        <!-- LOGIN FORM -->
        <div class="card" id="login-card">
            <div class="header-box">
                <h2>Welcome Back</h2>
                <p>Login to continue your earning</p>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <i class="fas fa-phone main-icon"></i>
                <input type="number" id="login-num" class="input-field" placeholder="017xxxxxxxx">
            </div>

            <div class="input-group">
                <label>Password</label>
                <i class="fas fa-lock main-icon"></i>
                <input type="password" id="login-pass" class="input-field" placeholder="••••••••">
                <i class="fas fa-eye toggle-pass" onclick="togglePassword('login-pass', this)"></i>
            </div>

            <div class="options">
                <label class="remember-me">
                    <input type="checkbox" id="remember"> Remember Me
                </label>
                <span style="color:var(--primary); cursor:pointer;">Forgot?</span>
            </div>

            <button class="btn" onclick="handleLogin()">LOGIN NOW</button>

            <div class="switch-form">
                Don't have an account? <span onclick="toggleAuth()">Register</span>
            </div>
        </div>

        <!-- REGISTRATION FORM -->
        <div class="card" id="register-form">
            <div class="header-box">
                <h2>Create Account</h2>
                <p>Join the Gmail selling network</p>
            </div>

            <div class="input-group">
                <label>Full Name</label>
                <i class="fas fa-user main-icon"></i>
                <input type="text" id="reg-name" class="input-field" placeholder="Your Name">
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <i class="fas fa-phone main-icon"></i>
                <input type="number" id="reg-num" class="input-field" placeholder="017xxxxxxxx">
            </div>

            <div class="input-group">
                <label>Password</label>
                <i class="fas fa-lock main-icon"></i>
                <input type="password" id="reg-pass" class="input-field" placeholder="••••••••">
                <i class="fas fa-eye toggle-pass" onclick="togglePassword('reg-pass', this)"></i>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <i class="fas fa-shield-halved main-icon"></i>
                <input type="password" id="reg-cpass" class="input-field" placeholder="••••••••">
            </div>

            <div class="input-group">
                <label>Referral Code (Name)</label>
                <i class="fas fa-users main-icon"></i>
                <input type="text" id="reg-ref" class="input-field" placeholder="Optional">
            </div>

            <button class="btn" onclick="handleRegister()">CREATE ACCOUNT</button>

            <div class="switch-form">
                Already have an account? <span onclick="toggleAuth()">Login</span>
            </div>
        </div>
    </div>

<script>
    // --- Firebase Config ---
    const firebaseConfig = {
      apiKey: "AIzaSyBFPd0umYUjpFBH08GNhpvjPA00kTh6Y5c",
      authDomain: "unlimited-73d64.firebaseapp.com",
      databaseURL: "https://unlimited-73d64-default-rtdb.firebaseio.com",
      projectId: "unlimited-73d64",
      storageBucket: "unlimited-73d64.firebasestorage.app",
      messagingSenderId: "1089467648940",
      appId: "1:1089467648940:web:ed748a5a93b27ee408c809"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Check Auto-Login
    auth.onAuthStateChanged(user => {
        if (user && localStorage.getItem('remembered') === 'true') {
            window.location.href = 'home.html';
        }
    });

    // Check URL for Referral Code
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        if (ref) {
            document.getElementById('reg-ref').value = ref;
            toggleAuth(); // Show register form if ref link is clicked
        }
    };

    // --- Auth Logic ---

    async function handleRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const num = document.getElementById('reg-num').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();
        const cpass = document.getElementById('reg-cpass').value.trim();
        const ref = document.getElementById('reg-ref').value.trim() || "none";

        if(!name || !num || !pass) return showToast("Please fill all fields!");
        if(pass !== cpass) return showToast("Password didn't match!");
        if(pass.length < 6) return showToast("Password min 6 chars!");

        // Use number as email for Firebase Auth
        const email = num + "@unlimited.com";

        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, pass);
            const uid = userCred.user.uid;

            // Save User Data
            await db.ref('users/' + uid).set({
                uid: uid,
                name: name,
                number: num,
                password: pass, // Stored for admin use
                referralBy: ref,
                status: 'inactive',
                balance: 0,
                taskSuccess: 0,
                taskFailed: 0,
                taskPending: 0,
                joinDate: new Date().toLocaleDateString()
            });

            showToast("Registration Success!", "success");
            setTimeout(() => window.location.href = 'home.html', 1500);

        } catch (err) {
            showToast(err.message);
        }
    }

    async function handleLogin() {
        const num = document.getElementById('login-num').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        const remember = document.getElementById('remember').checked;

        if(!num || !pass) return showToast("Fill all fields!");

        const email = num + "@unlimited.com";

        try {
            await auth.signInWithEmailAndPassword(email, pass);
            if(remember) localStorage.setItem('remembered', 'true');
            else localStorage.setItem('remembered', 'false');

            window.location.href = 'home.html';
        } catch (err) {
            showToast("Invalid number or password!");
        }
    }

    // --- UI Utilities ---

    function toggleAuth() {
        const loginCard = document.getElementById('login-card');
        const regCard = document.getElementById('register-form');
        if(loginCard.style.display === "none") {
            loginCard.style.display = "block";
            regCard.style.display = "none";
        } else {
            loginCard.style.display = "none";
            regCard.style.display = "block";
        }
    }

    function togglePassword(id, icon) {
        const field = document.getElementById(id);
        if(field.type === "password") {
            field.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            field.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function showToast(msg, type = "error") {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.background = type === "success" ? "#00ff88" : "#ff007a";
        toast.style.color = type === "success" ? "#000" : "#fff";
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 3000);
    }
</script>

</body>
</html>
