<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TNMINING - Sign In</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #05020c;
      --bg-secondary: #0d061f;
      --bg-card: rgba(18, 10, 36, 0.65);
      --border-color: rgba(168, 85, 247, 0.2);
      --border-focus: rgba(6, 182, 212, 0.6);
      --primary: #a855f7;
      --secondary: #06b6d4;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --error: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-primary);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.12) 0%, transparent 40%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Container holding the glassmorphic card */
    .auth-container {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                  0 0 40px rgba(168, 85, 247, 0.1);
      position: relative;
      z-index: 1;
      transform: translateY(0);
      transition: transform 0.3s ease;
    }

    /* Branding styles */
    .brand-section {
      text-align: center;
      margin-bottom: 35px;
    }

    .brand-logo-placeholder {
      width: 70px;
      height: 70px;
      margin: 0 auto 15px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
    }

    .brand-logo-placeholder i {
      font-size: 32px;
      color: #fff;
    }

    .brand-name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1.5px;
      background: linear-gradient(to right, #ffffff, #a855f7, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }

    .brand-tagline {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 22px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      margin-left: 4px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
      transition: color 0.3s ease;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      color: var(--text-main);
      font-size: 14.5px;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      border-color: var(--border-focus);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
    }

    .form-input:focus + i {
      color: var(--secondary);
    }

    /* Password visibility toggle */
    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.3s;
    }

    .password-toggle:hover {
      color: var(--text-main);
    }

    /* Options area (Remember/Forgot) */
    .auth-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      font-size: 13px;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
      color: var(--text-muted);
    }

    .checkbox-container input {
      display: none;
    }

    .checkmark {
      width: 18px;
      height: 18px;
      border: 1px solid var(--border-color);
      border-radius: 5px;
      margin-right: 8px;
      display: inline-block;
      position: relative;
      transition: all 0.2s ease;
    }

    .checkbox-container input:checked + .checkmark {
      background: var(--primary);
      border-color: var(--primary);
    }

    .checkbox-container input:checked + .checkmark::after {
      content: "\f00c";
      font-family: "Font Awesome 5 Free";
      font-weight: 900;
      color: #fff;
      font-size: 10px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .forgot-link {
      color: var(--secondary);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .forgot-link:hover {
      text-decoration: underline;
      opacity: 0.9;
    }

    /* Button Actions */
    .btn-submit {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.35);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(168, 85, 247, 0.5);
    }

    .btn-submit:active {
      transform: translateY(1px);
    }

    .btn-submit .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      position: absolute;
      left: 50%;
      top: 50%;
      margin-left: -10px;
      margin-top: -10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Redirect Text Link */
    .auth-footer {
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      margin-left: 5px;
      transition: opacity 0.2s;
    }

    .auth-footer a:hover {
      text-decoration: underline;
      opacity: 0.9;
    }

    /* Popups / Toast Alerts styling */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(18, 10, 36, 0.9);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 12px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast.error {
      border-left: 4px solid var(--error);
    }

    .toast.success {
      border-left: 4px solid var(--success);
    }

    .toast i {
      font-size: 16px;
    }

    .toast.error i {
      color: var(--error);
    }

    .toast.success i {
      color: var(--success);
    }

    /* Loading Overlay screen */
    .screen-loader {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.4s ease;
    }

    .screen-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(168, 85, 247, 0.1);
      border-top-color: var(--primary);
      border-right-color: var(--secondary);
      border-radius: 50%;
      animation: spin 1s infinite linear;
    }
  </style>
</head>
<body>

  <!-- Full-Screen Initial Loader -->
  <div class="screen-loader" id="screenLoader">
    <div class="loader-spinner"></div>
  </div>

  <!-- Main Login Card -->
  <div class="auth-container">
    <div class="brand-section">
      <div class="brand-logo-placeholder">
        <i class="fa-solid fa-cubes"></i>
      </div>
      <h1 class="brand-name">TNMINING</h1>
      <p class="brand-tagline">Premium TON Cloud Mining</p>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="loginEmail" class="form-input" placeholder="Enter your email" required autocomplete="email">
          <i class="fa-solid fa-envelope"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <div class="input-wrapper">
          <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
          <i class="fa-solid fa-lock"></i>
          <i class="fa-solid fa-eye password-toggle" id="togglePassword"></i>
        </div>
      </div>

      <div class="auth-options">
        <label class="checkbox-container">
          <input type="checkbox" id="rememberMe" checked>
          <span class="checkmark"></span>
          Remember me
        </label>
        <a href="#" class="forgot-link" id="forgotBtn">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">Sign In</span>
        <div class="spinner" id="btnSpinner"></div>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>

  <!-- Toast Notification System -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase Scripts (Compat Version for ease of modular browser use) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDuQICVoC10i62PQMS6cX37t1eoeTg5zsc",
      authDomain: "mining-c7b26.firebaseapp.com",
      databaseURL: "https://mining-c7b26-default-rtdb.firebaseio.com",
      projectId: "mining-c7b26",
      storageBucket: "mining-c7b26.firebasestorage.app",
      messagingSenderId: "873757658723",
      appId: "1:873757658723:web:18a4af95953a08b440b256"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();

    // DOM Selectors
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('loginEmail');
    const passwordInput = document.getElementById('loginPassword');
    const togglePassword = document.getElementById('togglePassword');
    const submitBtn = document.getElementById('submitBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const btnText = submitBtn.querySelector('.btn-text');
    const forgotBtn = document.getElementById('forgotBtn');
    const rememberMeCheckbox = document.getElementById('rememberMe');
    const screenLoader = document.getElementById('screenLoader');
    const toastContainer = document.getElementById('toastContainer');

    // Show Custom Toast
    function showToast(message, type = 'error') {
      const toast = document.createElement('div');
      toast.classList.add('toast', type);
      
      const icon = type === 'success' ? 'fa-circle-check' : 'fa-triangle-exclamation';
      toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
      
      toastContainer.appendChild(toast);
      
      // Trigger animations
      setTimeout(() => toast.classList.add('show'), 50);
      
      // Automatically remove
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Toggle Password Visibility
    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.classList.toggle('fa-eye');
      togglePassword.classList.toggle('fa-eye-slash');
    });

    // Check Auto-fill for Remember Me logic
    window.addEventListener('DOMContentLoaded', () => {
      const savedEmail = localStorage.getItem('tn_saved_email');
      if (savedEmail) {
        emailInput.value = savedEmail;
        rememberMeCheckbox.checked = true;
      }
      
      // Check auth status
      auth.onAuthStateChanged((user) => {
        if (user) {
          // If already signed in, check if user details exist, then redirect
          db.ref(`Users/${user.uid}`).once('value')
            .then(snapshot => {
              if (snapshot.exists() && snapshot.val().banned) {
                auth.signOut();
                showToast("Your account has been banned.", "error");
                screenLoader.classList.add('fade-out');
              } else {
                window.location.href = 'home.html';
              }
            })
            .catch(() => {
              window.location.href = 'home.html';
            });
        } else {
          // No user, dismiss screen loader animation
          screenLoader.classList.add('fade-out');
        }
      });
    });

    // Handle Form Submission (Sign In)
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showToast("Please fill in all fields.");
        return;
      }

      // Enter Loading State
      submitBtn.disabled = true;
      btnSpinner.style.display = 'block';
      btnText.style.opacity = '0.3';

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          
          // Check if account is banned inside the db
          db.ref(`Users/${user.uid}`).once('value')
            .then((snapshot) => {
              if (snapshot.exists() && snapshot.val().banned) {
                auth.signOut();
                showToast("Your account is suspended.", "error");
                resetButtonState();
              } else {
                // Remember Me Persistence settings
                if (rememberMeCheckbox.checked) {
                  localStorage.setItem('tn_saved_email', email);
                } else {
                  localStorage.removeItem('tn_saved_email');
                }
                showToast("Success! Logging in...", "success");
                setTimeout(() => {
                  window.location.href = 'home.html';
                }, 1000);
              }
            });
        })
        .catch((error) => {
          let errorMsg = "Incorrect email or password.";
          if (error.code === 'auth/invalid-credential') {
            errorMsg = "Invalid credentials. Please try again.";
          } else if (error.code === 'auth/user-not-found') {
            errorMsg = "Account not found.";
          } else if (error.code === 'auth/wrong-password') {
            errorMsg = "Incorrect password.";
          } else if (error.code === 'auth/too-many-requests') {
            errorMsg = "Too many attempts. Try again later.";
          }
          showToast(errorMsg, "error");
          resetButtonState();
        });
    });

    // Handle Reset Password (Forgot Password)
    forgotBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();

      if (!email) {
        showToast("Please enter your email to reset password.");
        return;
      }

      auth.sendPasswordResetEmail(email)
        .then(() => {
          showToast("Password reset link sent to your email.", "success");
        })
        .catch((error) => {
          let errorMsg = "Failed to send reset email.";
          if (error.code === 'auth/user-not-found') {
            errorMsg = "No account found with this email.";
          } else if (error.code === 'auth/invalid-email') {
            errorMsg = "Please enter a valid email address.";
          }
          showToast(errorMsg, "error");
        });
    });

    // Helper to reset button layout
    function resetButtonState() {
      submitBtn.disabled = false;
      btnSpinner.style.display = 'none';
      btnText.style.opacity = '1';
    }
  </script>
</body>
</html>
