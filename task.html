<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TNMINING - Core Tasks</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #020009;
      --bg-secondary: #09041a;
      --bg-card: rgba(13, 6, 30, 0.65);
      --border-color: rgba(168, 85, 247, 0.18);
      --primary: #a855f7;
      --secondary: #06b6d4;
      --gold: #fbbf24;
      --gold-glow: rgba(251, 191, 36, 0.35);
      --primary-glow: rgba(168, 85, 247, 0.3);
      --secondary-glow: rgba(6, 182, 212, 0.2);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --error: #ef4444;
      --radius-premium: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-primary);
      background-image: 
        radial-gradient(circle at 50% -20%, var(--primary-glow) 0%, transparent 60%),
        radial-gradient(circle at 10% 100%, var(--secondary-glow) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 95px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 16px;
      opacity: 0;
      transform: translateY(15px);
      animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade-in-up {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Page Header */
    .page-header {
      text-align: center;
      margin-bottom: 24px;
      padding-top: 10px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .page-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Shimmer Skeleton Screen */
    .skeleton-screen {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .skeleton-item {
      height: 90px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }

    .skeleton-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      transform: translateX(-100%);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }

    /* Dynamic Tasks Listing Box */
    .tasks-list-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Task Card Design (matches Mining and Home precisely) */
    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 22px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      position: relative;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .task-card:hover {
      border-color: var(--secondary);
    }

    .task-card.completed {
      border-color: rgba(16, 185, 129, 0.2);
    }

    .task-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .task-profile-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .task-icon-box {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--secondary);
      flex-shrink: 0;
    }

    .task-meta-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .task-title {
      font-size: 13.5px;
      font-weight: 800;
      color: var(--text-main);
      line-height: 1.3;
    }

    .task-description {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .task-reward-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      background: rgba(251, 191, 36, 0.06);
      border: 1px solid rgba(251, 191, 36, 0.18);
      padding: 3px 10px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    /* Verification Status Banner */
    .verification-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.03);
      padding: 8px 12px;
      border-radius: 12px;
      color: var(--text-muted);
    }

    .verification-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .verification-val {
      font-weight: 700;
      color: var(--text-main);
    }

    /* Action Claim Controls */
    .task-actions {
      display: flex;
      gap: 10px;
    }

    .btn-task {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 14px;
      font-size: 12.5px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-task-link {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }

    .btn-task-link:hover {
      border-color: var(--secondary);
      background: rgba(6, 182, 212, 0.05);
    }

    .btn-task-claim {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.25);
    }

    .btn-task-claim:disabled {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.02);
    }

    /* Empty State (Rule 2) */
    .empty-tasks-card {
      background: var(--bg-card);
      border: 1.5px dashed var(--border-color);
      border-radius: var(--radius-premium);
      padding: 45px 24px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .empty-tasks-card i {
      font-size: 36px;
      color: rgba(168, 85, 247, 0.3);
      margin-bottom: 14px;
      animation: float-icon 3s infinite ease-in-out;
    }

    @keyframes float-icon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .empty-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .empty-subtitle {
      font-size: 11.5px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Bottom Navigation Styles */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: rgba(5, 2, 15, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(168, 85, 247, 0.12);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 999;
      padding: 0 10px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-muted);
      width: 60px;
      transition: all 0.2s ease;
    }

    .nav-item i { font-size: 19px; }
    .nav-item span { font-size: 10px; font-weight: 500; }
    .nav-item.active { color: var(--primary); }

    .nav-item-mining {
      position: relative;
      top: -16px;
      width: 62px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff !important;
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4);
      border: 4.5px solid var(--bg-primary);
    }

    .nav-item-mining i { font-size: 22px; }

    /* Toasts Alerts */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(18, 10, 36, 0.95);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 12px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast.show { transform: translateX(0); }
    .toast.error { border-left: 4px solid var(--error); }
    .toast.success { border-left: 4px solid var(--success); }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Title Area -->
    <div class="page-header">
      <h1 class="page-title">Dynamic Alliance Missions</h1>
      <p class="page-subtitle">Verify dynamic alliance tasks and earn extra tokens instantly</p>
    </div>

    <!-- Skeletons Loader State Container -->
    <div class="skeleton-screen" id="skeletonContainer">
      <div class="skeleton-item"></div>
      <div class="skeleton-item"></div>
      <div class="skeleton-item"></div>
    </div>

    <!-- Active Tasks Directory (Fully Reactive to Firebase Nodes) -->
    <div class="tasks-list-stack" id="tasksDirectory" style="display:none;">
      <!-- Compiled dynamically via script -->
    </div>

  </div>

  <!-- Bottom Navigation Menu -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="task.html" class="nav-item active">
      <i class="fa-solid fa-list-check"></i>
      <span>Tasks</span>
    </a>
    <a href="mining.html" class="nav-item-mining">
      <i class="fa-solid fa-circle-notch"></i>
    </a>
    <a href="referral.html" class="nav-item">
      <i class="fa-solid fa-user-group"></i>
      <span>Referral</span>
    </a>
    <a href="account.html" class="nav-item">
      <i class="fa-solid fa-user"></i>
      <span>Account</span>
    </a>
  </nav>

  <!-- Notification Toasts Portal -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase Legacy Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDuQICVoC10i62PQMS6cX37t1eoeTg5zsc",
      authDomain: "mining-c7b26.firebaseapp.com",
      databaseURL: "https://mining-c7b26-default-rtdb.firebaseio.com",
      projectId: "mining-c7b26",
      storageBucket: "mining-c7b26.firebasestorage.app",
      messagingSenderId: "873757658723",
      appId: "1:873757658723:web:18a4af95953a08b440b256"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();

    // DOM Elements
    const skeletonContainer = document.getElementById('skeletonContainer');
    const tasksDirectory = document.getElementById('tasksDirectory');
    const toastContainer = document.getElementById('toastContainer');

    let currentUser = null;
    let userData = null;
    let globalTasksData = {};
    let countdownTimersInterval = null;

    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
      } else {
        currentUser = user;
        bindDynamicTasksPlatform();
      }
    });

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.classList.add('toast', type);
      const icon = type === 'success' ? 'fa-circle-check' : 'fa-triangle-exclamation';
      toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 50);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Connect Dynamic platform listener directly to Tasks database tree (Rule 1, 3, 10 & 15)
    function bindDynamicTasksPlatform() {
      db.ref(`Users/${currentUser.uid}`).on('value', (userSnapshot) => {
        if (!userSnapshot.exists()) return;
        userData = userSnapshot.val();

        // Query active configurations
        db.ref('Tasks').on('value', (tasksSnapshot) => {
          skeletonContainer.style.display = 'none';
          tasksDirectory.style.display = 'flex';

          if (!tasksSnapshot.exists() || Object.keys(tasksSnapshot.val()).length === 0) {
            // Render Premium Empty State Card (Rule 2)
            tasksDirectory.innerHTML = `
              <div class="empty-tasks-card">
                <i class="fa-solid fa-layer-group"></i>
                <h4 class="empty-title">No Active Missions Available</h4>
                <p class="empty-subtitle">New tasks will appear here when the administrator publishes them.</p>
              </div>
            `;
            return;
          }

          globalTasksData = tasksSnapshot.val();
          renderDynamicTasksDirectory();
        });
      });
    }

    // Render Dynamic Directory based on individual structures (Rule 4, 5, 6, 7 & 9)
    function renderDynamicTasksDirectory() {
      if (countdownTimersInterval) clearInterval(countdownTimersInterval);

      const tasksKeys = Object.keys(globalTasksData);
      const userCompletions = userData.completedTasks || {};
      let compiledHTML = "";

      tasksKeys.forEach((key) => {
        const task = globalTasksData[key];
        
        // Skip rendering if task is marked disabled by Admin (Rule 3 & 9)
        if (task.enabled === false) return;

        const lastClaim = userCompletions[key] ? userCompletions[key].lastClaimTime : 0;
        const claimStatus = userCompletions[key] ? userCompletions[key].status : "Available";
        const now = Date.now();

        // 1. Resolve Dynamic Icons based on Task types (Rule 5 & 6)
        let iconClass = "fa-hashtag";
        if (task.taskType === 'telegram_channel' || task.taskType === 'telegram_group') iconClass = "fa-telegram";
        else if (task.taskType === 'visit_website') iconClass = "fa-earth-americas";
        else if (task.taskType === 'mini_app') iconClass = "fa-cubes";
        else if (task.taskType === 'video') iconClass = "fa-play";
        else if (task.taskType === 'invite') iconClass = "fa-user-group";

        // 2. Format Reward details (Rule 4)
        let rewardFormatted = "";
        if (task.rewardType === 'power') rewardFormatted = `+${Number(task.reward).toLocaleString()} POWER`;
        else if (task.rewardType === 'usd') rewardFormatted = `+$${parseFloat(task.reward).toFixed(4)} USD`;
        else if (task.rewardType === 'ton') rewardFormatted = `+${parseFloat(task.reward).toFixed(4)} TON`;
        else rewardFormatted = `+${Number(task.reward).toLocaleString()} BONUS`;

        // 3. Evaluate verification badge texts (Rule 6 & 7)
        let verifText = "Instant verification";
        if (task.verificationType === 'manual') verifText = "Requires manual approval";
        else if (task.verificationType === 'link_visit') verifText = "Requires redirection visit";
        else if (task.verificationType === 'tg_join') verifText = "Telegram automated verification";

        // 4. Resolve Dynamic Action button states (Rule 9)
        let actionBtnHTML = "";
        let isLocked = false;

        // Check global claim threshold limit (Rule 3)
        const globalLimit = parseInt(task.claimLimit || 0);
        const globalClaimsCount = parseInt(task.claimsCount || 0);
        const limitReached = (globalLimit > 0) && (globalClaimsCount >= globalLimit);

        // Check timestamp expiration rules
        const expiryTime = parseInt(task.expiry || 0);
        const expired = (expiryTime > 0) && (now > expiryTime);

        if (expired) {
          actionBtnHTML = `<button class="btn-task btn-task-claim" disabled>Expired</button>`;
        } else if (limitReached) {
          actionBtnHTML = `<button class="btn-task btn-task-claim" disabled>Limit Exceeded</button>`;
        } else if (claimStatus === 'PendingApproval') {
          actionBtnHTML = `<button class="btn-task btn-task-claim" disabled><i class="fa-solid fa-clock-rotate-left"></i> Pending Verification</button>`;
        } else if (claimStatus === 'Completed') {
          const cooldownDuration = parseInt(task.cooldown || 0);
          if (cooldownDuration > 0) {
            // Check if cooling down elapsed satisfies limits
            const cooldownMs = cooldownDuration * 1000;
            const remaining = Math.max(0, Math.floor((lastClaim + cooldownMs - now) / 1000));
            
            if (remaining > 0) {
              isLocked = true;
              actionBtnHTML = `<button class="btn-task btn-task-claim" disabled id="cooldown_${task.id}">Cooldown ...</button>`;
            } else {
              actionBtnHTML = `<button class="btn-task btn-task-claim" onclick="executeClaimAction('${task.id}')">Claim Reward</button>`;
            }
          } else {
            actionBtnHTML = `<button class="btn-task btn-task-claim completed" disabled><i class="fa-solid fa-circle-check"></i> Completed</button>`;
          }
        } else {
          // Task Available
          if (task.url) {
            actionBtnHTML = `
              <button class="btn-task btn-task-link" onclick="openTaskRedirect('${task.id}', '${task.url}')">${task.buttonText || "Join Link"}</button>
              <button class="btn-task btn-task-claim" id="claim_btn_${task.id}" onclick="executeClaimAction('${task.id}')" disabled>Claim</button>
            `;
          } else {
            actionBtnHTML = `<button class="btn-task btn-task-claim" onclick="executeClaimAction('${task.id}')">Verify & Claim</button>`;
          }
        }

        compiledHTML += `
          <div class="task-card ${claimStatus === 'Completed' && !isLocked ? 'completed' : ''}" id="card_${task.id}">
            <div class="task-card-header">
              <div class="task-profile-wrapper">
                <div class="task-icon-box"><i class="fa-solid ${iconClass}"></i></div>
                <div class="task-meta-info">
                  <span class="task-title">${task.title}</span>
                  <span class="task-description">${task.description || "alliance sub task mission"}</span>
                </div>
              </div>
              <span class="task-reward-badge">${rewardFormatted}</span>
            </div>

            <div class="verification-bar">
              <span class="verification-label"><i class="fa-solid fa-shield-halved" style="color:var(--secondary);"></i> Network protocol</span>
              <span class="verification-val">${verifText}</span>
            </div>

            <div class="task-actions">
              ${actionBtnHTML}
            </div>
          </div>
        `;
      });

      tasksDirectory.innerHTML = compiledHTML;

      // Initialize Cooldown dynamic text update loops
      const runCooldownTickers = () => {
        const now = Date.now();
        tasksKeys.forEach((key) => {
          const task = globalTasksData[key];
          const timerEl = document.getElementById(`cooldown_${task.id}`);
          if (!timerEl) return;

          const lastClaim = userCompletions[key] ? userCompletions[key].lastClaimTime : 0;
          const cooldownDuration = parseInt(task.cooldown || 0);
          const cooldownMs = cooldownDuration * 1000;
          
          const remainingSecs = Math.max(0, Math.floor((lastClaim + cooldownMs - now) / 1000));
          
          if (remainingSecs <= 0) {
            // Hotreload directory layout to activate
            renderDynamicTasksDirectory();
          } else {
            const hours = Math.floor(remainingSecs / 3600).toString().padStart(2, '0');
            const mins = Math.floor((remainingSecs % 3600) / 60).toString().padStart(2, '0');
            const secs = (remainingSecs % 60).toString().padStart(2, '0');
            timerEl.innerHTML = `<i class="fa-solid fa-clock fa-spin" style="color:var(--gold);"></i> Retry in ${hours}:${mins}:${secs}`;
          }
        });
      };

      runCooldownTickers();
      countdownTimersInterval = setInterval(runCooldownTickers, 1000);
    }

    // Handles user opening social task redirection links
    window.openTaskRedirect = function(taskId, url) {
      window.open(url, '_blank');
      showToast("Verification link opened! Please complete task, then click claim.", "success");

      const claimBtn = document.getElementById(`claim_btn_${taskId}`);
      if (claimBtn) {
        // Enforce a simple UI button delay of 2.5 seconds to prevent automated fast clicks
        let count = 3;
        claimBtn.innerHTML = `Verifying (${count}s)...`;
        
        const verifDelay = setInterval(() => {
          count--;
          if (count <= 0) {
            clearInterval(verifDelay);
            claimBtn.disabled = false;
            claimBtn.textContent = "Claim Reward";
          } else {
            claimBtn.innerHTML = `Verifying (${count}s)...`;
          }
        }, 1000);
      }
    };

    // Execute Claim action based on rules validation types (Rule 7, 8 & 9)
    window.executeClaimAction = function(taskId) {
      const taskObj = globalTasksData[taskId];
      if (!taskObj) return;

      const userClaimBtn = document.getElementById(`claim_btn_${taskId}`) || document.querySelector(`#card_${taskId} .btn-task-claim`);
      if (userClaimBtn) userClaimBtn.disabled = true;

      const now = Date.now();

      // SCENARIO 1: MANUAL REVIEW CLASSIFICATION (Rule 7)
      if (taskObj.verificationType === 'manual') {
        const claimId = db.ref('ManualClaimsQueue').push().key;

        const manualClaimPayload = {
          claimId: claimId,
          taskId: taskId,
          taskTitle: taskObj.title,
          uid: currentUser.uid,
          username: userData.username,
          reward: taskObj.reward,
          rewardType: taskObj.rewardType,
          submittedAt: firebase.database.ServerValue.TIMESTAMP,
          status: "PendingApproval"
        };

        const updatePayload = {};
        updatePayload[`ManualClaimsQueue/${claimId}`] = manualClaimPayload;
        updatePayload[`Users/${currentUser.uid}/completedTasks/${taskId}`] = {
          lastClaimTime: now,
          status: "PendingApproval"
        };

        db.ref().update(updatePayload)
          .then(() => {
            showToast("Claim request submitted! Administrator will review your entry manually.", "success");
          })
          .catch(() => {
            showToast("Failed to queue manual review.", "error");
            if (userClaimBtn) userClaimBtn.disabled = false;
          });

        return;
      }

      // SCENARIO 2: INSTANT DIRECT PAYOUT/CLAIM
      const userRef = db.ref(`Users/${currentUser.uid}`);
      userRef.transaction((curr) => {
        if (curr) {
          if (!curr.completedTasks) curr.completedTasks = {};
          
          // Log task state to Completed
          curr.completedTasks[taskId] = {
            lastClaimTime: now,
            status: "Completed"
          };

          // Credit respective balance variables (Rule 4)
          const rewardVal = parseFloat(taskObj.reward);
          if (taskObj.rewardType === 'power') {
            curr.power = (curr.power || 1000) + parseInt(rewardVal);
          } else {
            curr.balance = parseFloat(curr.balance || 0) + rewardVal;
          }
        }
        return curr;
      }, (error, committed) => {
        if (committed) {
          // Increment total claims metrics in global task configurations
          db.ref(`Tasks/${taskId}/claimsCount`).transaction((count) => {
            return (parseInt(count) || 0) + 1;
          });

          const formattedReward = taskObj.rewardType === 'power' ? `+${Number(taskObj.reward).toLocaleString()} POWER` : `+$${parseFloat(taskObj.reward).toFixed(4)}`;
          showToast(`Success! claimed ${formattedReward} reward.`, "success");
        } else {
          showToast("Failed to write payout claim.", "error");
          if (userClaimBtn) userClaimBtn.disabled = false;
        }
      });
    };

    window.addEventListener('beforeunload', () => {
      if (countdownTimersInterval) clearInterval(countdownTimersInterval);
    });
  </script>
</body>
</html>
