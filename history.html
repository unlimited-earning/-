<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity History - Unlimited Earning</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #00ff88;
            --warning: #ffcc00;
            --danger: #ff0055;
            --bg: #0b0e1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: radial-gradient(circle at top left, #1a1c2c, #0b0e1a);
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            padding-bottom: 50px;
        }

        /* Header */
        .header {
            width: 100%; max-width: 500px; padding: 25px 20px;
            display: flex; align-items: center; position: sticky; top: 0;
            background: rgba(11, 14, 26, 0.8); backdrop-filter: blur(15px); z-index: 100;
        }
        .back-btn {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            color: white; width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .header h1 { flex-grow: 1; text-align: center; font-size: 20px; font-weight: 700; }

        /* Filter Tabs */
        .tabs {
            width: 90%; max-width: 450px; display: flex; gap: 10px; margin: 20px 0;
            overflow-x: auto; padding-bottom: 5px; scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 10px 20px; background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
            white-space: nowrap; transition: 0.3s; color: #aaa;
        }
        .tab-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* History List */
        .history-container { width: 90%; max-width: 450px; }
        .history-item {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 20px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 15px;
            animation: slideUp 0.4s ease forwards;
        }
        @keyframes slideUp { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }

        .icon-box {
            width: 45px; height: 45px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .icon-task { background: rgba(255, 204, 0, 0.1); color: var(--warning); }
        .icon-withdraw { background: rgba(0, 210, 255, 0.1); color: var(--primary); }
        .icon-refer { background: rgba(0, 255, 136, 0.1); color: var(--success); }
        .icon-bonus { background: rgba(255, 0, 122, 0.1); color: #ff007a; }

        .details { flex-grow: 1; }
        .details b { font-size: 15px; display: block; margin-bottom: 2px; }
        .details span { font-size: 11px; color: #777; }

        .amt-status { text-align: right; }
        .amt-status .amt { font-weight: 700; font-size: 15px; display: block; }
        .amt-status .status { font-size: 10px; text-transform: uppercase; font-weight: 800; padding: 2px 8px; border-radius: 8px; }
        
        .status-success { background: rgba(0, 255, 136, 0.1); color: var(--success); }
        .status-pending { background: rgba(255, 204, 0, 0.1); color: var(--warning); }
        .status-failed { background: rgba(255, 0, 85, 0.1); color: var(--danger); }

        .empty-state { text-align: center; margin-top: 50px; color: #444; }
        .empty-state i { font-size: 50px; margin-bottom: 15px; }

        .notice-3day {
            width: 90%; max-width: 450px; text-align: center;
            font-size: 11px; color: #555; margin-bottom: 15px;
            background: rgba(255,255,255,0.02); padding: 8px; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="location.href='home.html'"><i class="fas fa-chevron-left"></i></div>
        <h1>History</h1>
        <div style="width: 40px;"></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="filterHistory('All', this)">All History</button>
        <button class="tab-btn" onclick="filterHistory('Task', this)">Tasks</button>
        <button class="tab-btn" onclick="filterHistory('Withdraw', this)">Withdraws</button>
        <button class="tab-btn" onclick="filterHistory('Referral', this)">Referrals</button>
        <button class="tab-btn" onclick="filterHistory('Bonus', this)">Bonuses</button>
    </div>

    <div class="notice-3day">
        <i class="fas fa-info-circle"></i> History is automatically cleared after 3 days.
    </div>

    <div class="history-container" id="history-list">
        <!-- History Items Load Here -->
        <div class="empty-state">
            <i class="fas fa-history"></i>
            <p>Loading history...</p>
        </div>
    </div>

<script>
    // --- Firebase Configuration ---
    const firebaseConfig = {
      apiKey: "AIzaSyBFPd0umYUjpFBH08GNhpvjPA00kTh6Y5c",
      authDomain: "unlimited-73d64.firebaseapp.com",
      databaseURL: "https://unlimited-73d64-default-rtdb.firebaseio.com",
      projectId: "unlimited-73d64",
      storageBucket: "unlimited-73d64.firebasestorage.app",
      messagingSenderId: "1089467648940",
      appId: "1:1089467648940:web:ed748a5a93b27ee408c809"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let allData = [];
    let currentFilter = 'All';

    auth.onAuthStateChanged(user => {
        if (user) { loadHistory(user.uid); }
        else { window.location.href = 'index.html'; }
    });

    async function loadHistory(uid) {
        // Fetch from 'history/uid'
        db.ref('history/' + uid).on('value', snap => {
            allData = [];
            const now = Date.now();
            const threeDaysMs = 3 * 24 * 60 * 60 * 1000;

            if(snap.exists()) {
                snap.forEach(child => {
                    const data = child.val();
                    const itemTime = data.timestamp || 0;

                    // Condition: Check if older than 3 days
                    if (now - itemTime > threeDaysMs) {
                        // Optional: Delete from database permanently
                        db.ref('history/' + uid + '/' + child.key).remove();
                    } else {
                        allData.push({ id: child.key, ...data });
                    }
                });
                renderList();
            } else {
                showEmpty();
            }
        });
    }

    function renderList() {
        const container = document.getElementById('history-list');
        container.innerHTML = "";

        const filtered = currentFilter === 'All' ? allData : allData.filter(i => i.type === currentFilter);
        
        // Sort: Newest First
        filtered.sort((a, b) => b.timestamp - a.timestamp);

        if(filtered.length === 0) {
            showEmpty();
            return;
        }

        filtered.forEach(item => {
            const dateStr = new Date(item.timestamp).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
            
            let iconClass = "icon-task", icon = "fa-tasks";
            if(item.type === 'Withdraw') { iconClass = "icon-withdraw"; icon = "fa-wallet"; }
            if(item.type === 'Referral') { iconClass = "icon-refer"; icon = "fa-user-check"; }
            if(item.type === 'Bonus') { iconClass = "icon-bonus"; icon = "fa-gift"; }

            const statusClass = "status-" + (item.status ? item.status.toLowerCase() : "success");

            const div = document.createElement('div');
            div.className = "history-item";
            div.innerHTML = `
                <div class="icon-box ${iconClass}"><i class="fas ${icon}"></i></div>
                <div class="details">
                    <b>${item.type} ${item.method ? '('+item.method+')' : ''}</b>
                    <span>${dateStr}</span>
                </div>
                <div class="amt-status">
                    <span class="amt">৳${item.amount}</span>
                    <span class="status ${statusClass}">${item.status || 'Success'}</span>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function filterHistory(type, btn) {
        currentFilter = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList();
    }

    function showEmpty() {
        document.getElementById('history-list').innerHTML = `
            <div class="empty-state">
                <i class="fas fa-folder-open"></i>
                <p>No recent history found within 3 days.</p>
            </div>
        `;
    }
</script>

</body>
</html>
