<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TNMINING - User Profile</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #05020c;
      --bg-secondary: #0d061f;
      --bg-card: rgba(18, 10, 36, 0.65);
      --border-color: rgba(168, 85, 247, 0.2);
      --border-focus: rgba(6, 182, 212, 0.6);
      --primary: #a855f7;
      --secondary: #06b6d4;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --error: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-primary);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 100px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* Profile Header Box */
    .profile-hero {
      background: linear-gradient(135deg, rgba(20, 10, 45, 0.8) 0%, rgba(8, 4, 25, 0.8) 100%);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 30px 20px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .profile-avatar {
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      border: 3px solid var(--border-color);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
      margin: 0 auto 15px;
    }

    .profile-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .join-date {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-bottom: 15px;
    }

    /* ID Copy wrapper */
    .id-wrapper {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 6px 14px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 11.5px;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .id-wrapper:hover {
      color: var(--text-main);
    }

    .id-val {
      font-family: 'Share Tech Mono', monospace;
      color: var(--secondary);
    }

    /* Grid Stats Box */
    .profile-stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .p-stat-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .p-stat-label {
      font-size: 10.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .p-stat-val {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-main);
    }

    .p-stat-val.highlight {
      color: var(--secondary);
    }

    /* Interactive Menu List */
    .menu-card {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      padding: 10px;
      margin-bottom: 20px;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      color: var(--text-main);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-item-left i {
      font-size: 15px;
      color: var(--primary);
      width: 20px;
      text-align: center;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.02);
      padding-left: 20px;
    }

    .menu-item.logout-btn {
      color: var(--error);
    }

    .menu-item.logout-btn i {
      color: var(--error);
    }

    /* History Ledger */
    .history-card {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      padding: 20px;
    }

    .history-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-item {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .item-wallet {
      font-size: 11.5px;
      color: var(--text-main);
      font-family: 'Share Tech Mono', monospace;
      max-width: 170px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-date {
      font-size: 9.5px;
      color: var(--text-muted);
    }

    .status-badge {
      font-size: 8.5px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .status-badge.pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
    .status-badge.approved { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .status-badge.completed { background: rgba(6, 182, 212, 0.1); color: var(--secondary); border: 1px solid rgba(6, 182, 212, 0.2); }
    .status-badge.rejected { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); }

    .empty-state {
      text-align: center;
      padding: 15px 0;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Bottom Navigation Bar Styles */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(13, 6, 31, 0.9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(168, 85, 247, 0.15);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 999;
      padding: 0 10px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-muted);
      width: 60px;
      transition: all 0.2s ease;
    }

    .nav-item i { font-size: 18px; }
    .nav-item span { font-size: 10px; font-weight: 500; }
    .nav-item.active { color: var(--primary); }

    /* Center floating button */
    .nav-item-mining {
      position: relative;
      top: -15px;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff !important;
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.45);
      border: 4px solid var(--bg-primary);
    }

    .nav-item-mining i {
      font-size: 24px;
    }

    /* Toast elements */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(18, 10, 36, 0.95);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 12px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast.show { transform: translateX(0); }
    .toast.error { border-left: 4px solid var(--error); }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error i { color: var(--error); }
    .toast.success i { color: var(--success); }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Hero Box -->
    <div class="profile-hero">
      <div class="profile-avatar" id="avatarDisplay">U</div>
      <h2 class="profile-name" id="usernameDisplay">Loading...</h2>
      <p class="join-date" id="joinDateDisplay">Joined: Loading...</p>

      <!-- ID Copy widget -->
      <div class="id-wrapper" id="copyIdBtn">
        ID: <span class="id-val" id="userIdVal">Loading...</span>
        <i class="fa-solid fa-copy"></i>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="profile-stats-grid">
      <div class="p-stat-box">
        <span class="p-stat-label">Active Power</span>
        <span class="p-stat-val highlight" id="powerDisplay">0 HP</span>
      </div>
      <div class="p-stat-box">
        <span class="p-stat-label">Wallet Balance</span>
        <span class="p-stat-val" id="balanceDisplay">$0.0000</span>
      </div>
      <div class="p-stat-box">
        <span class="p-stat-label">Total Earnings</span>
        <span class="p-stat-val" id="totalEarningsDisplay">$0.0000</span>
      </div>
      <div class="p-stat-box">
        <span class="p-stat-label">Affiliate Count</span>
        <span class="p-stat-val" id="referralsDisplay">0 Users</span>
      </div>
    </div>

    <!-- settings menu options -->
    <div class="menu-card">
      <a href="buy-power.html" class="menu-item">
        <div class="menu-item-left">
          <i class="fa-solid fa-bolt"></i>
          <span>Upgrade Hashrate</span>
        </div>
        <i class="fa-solid fa-chevron-right"></i>
      </a>
      
      <a href="withdraw.html" class="menu-item">
        <div class="menu-item-left">
          <i class="fa-solid fa-wallet"></i>
          <span>Withdrawal Gateways</span>
        </div>
        <i class="fa-solid fa-chevron-right"></i>
      </a>

      <!-- Admin Dashboard link (initially hidden, visible if admin tags match) -->
      <a href="admin.html" class="menu-item" id="adminLink" style="display: none;">
        <div class="menu-item-left">
          <i class="fa-solid fa-screwdriver-wrench" style="color: var(--secondary);"></i>
          <span style="color: var(--secondary);">Admin Console</span>
        </div>
        <i class="fa-solid fa-chevron-right"></i>
      </a>

      <div class="menu-item logout-btn" id="logoutBtn">
        <div class="menu-item-left">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Logout Account</span>
        </div>
        <i class="fa-solid fa-chevron-right"></i>
      </div>
    </div>

    <!-- History Logs -->
    <div class="history-card">
      <h2 class="history-title">
        <i class="fa-solid fa-clock-rotate-left"></i> Withdrawal History
      </h2>
      <div class="history-list" id="historyContainer">
        <div class="empty-state">No transaction logs found.</div>
      </div>
    </div>

  </div>

  <!-- Bottom Navigation System -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="task.html" class="nav-item">
      <i class="fa-solid fa-list-check"></i>
      <span>Tasks</span>
    </a>
    <a href="mining.html" class="nav-item-mining">
      <i class="fa-solid fa-circle-notch"></i>
    </a>
    <a href="referral.html" class="nav-item">
      <i class="fa-solid fa-user-group"></i>
      <span>Referral</span>
    </a>
    <a href="account.html" class="nav-item active">
      <i class="fa-solid fa-user"></i>
      <span>Account</span>
    </a>
  </nav>

  <!-- Notification Toasts -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDuQICVoC10i62PQMS6cX37t1eoeTg5zsc",
      authDomain: "mining-c7b26.firebaseapp.com",
      databaseURL: "https://mining-c7b26-default-rtdb.firebaseio.com",
      projectId: "mining-c7b26",
      storageBucket: "mining-c7b26.firebasestorage.app",
      messagingSenderId: "873757658723",
      appId: "1:873757658723:web:18a4af95953a08b440b256"
    };

    // Initialize
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();

    // DOM Elements
    const toastContainer = document.getElementById('toastContainer');
    const avatarDisplay = document.getElementById('avatarDisplay');
    const usernameDisplay = document.getElementById('usernameDisplay');
    const joinDateDisplay = document.getElementById('joinDateDisplay');
    const userIdVal = document.getElementById('userIdVal');
    const copyIdBtn = document.getElementById('copyIdBtn');

    const powerDisplay = document.getElementById('powerDisplay');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const totalEarningsDisplay = document.getElementById('totalEarningsDisplay');
    const referralsDisplay = document.getElementById('referralsDisplay');

    const adminLink = document.getElementById('adminLink');
    const logoutBtn = document.getElementById('logoutBtn');
    const historyContainer = document.getElementById('historyContainer');

    let currentUser = null;

    // Route Guard check
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
      } else {
        currentUser = user;
        bindAccountData();
        checkAdminCredentials();
        loadUserWithdraws();
      }
    });

    // Custom alerts
    function showToast(message, type = 'error') {
      const toast = document.createElement('div');
      toast.classList.add('toast', type);
      const icon = type === 'success' ? 'fa-circle-check' : 'fa-triangle-exclamation';
      toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 50);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Connect user statistics
    function bindAccountData() {
      db.ref(`Users/${currentUser.uid}`).on('value', (snapshot) => {
        if (!snapshot.exists()) return;
        const data = snapshot.val();

        // Parse Name and initials
        const name = data.username || "User";
        usernameDisplay.textContent = name.charAt(0).toUpperCase() + name.slice(1);
        avatarDisplay.textContent = name.charAt(0).toUpperCase();

        // Format Date Registered
        if (data.createdAt) {
          const formattedDate = new Date(data.createdAt).toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric'
          });
          joinDateDisplay.textContent = `Joined: ${formattedDate}`;
        }

        userIdVal.textContent = currentUser.uid;

        // Populate metrics
        powerDisplay.textContent = `${Number(data.power || 1000).toLocaleString()} HP`;
        balanceDisplay.textContent = `$${parseFloat(data.balance || 0).toFixed(6)}`;
        totalEarningsDisplay.textContent = `$${parseFloat(data.totalEarnings || 0).toFixed(6)}`;
        referralsDisplay.textContent = `${data.referralsCount || 0} Users`;
      });
    }

    // Check if the current user is an admin
    function checkAdminCredentials() {
      db.ref(`Admin/${currentUser.uid}`).once('value', (snapshot) => {
        if (snapshot.exists() && snapshot.val() === true) {
          adminLink.style.display = 'flex';
        }
      });
    }

    // Copy UID to Clipboard
    copyIdBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(currentUser.uid)
        .then(() => showToast("User ID copied!", "success"))
        .catch(() => showToast("Failed to copy ID."));
    });

    // Load User's Withdraw logs
    function loadUserWithdraws() {
      db.ref(`Users/${currentUser.uid}/withdrawHistory`).on('value', (snapshot) => {
        historyContainer.innerHTML = "";

        if (!snapshot.exists()) {
          historyContainer.innerHTML = `<div class="empty-state">No transaction logs found.</div>`;
          return;
        }

        const logs = snapshot.val();
        const logsArray = Object.keys(logs).map(key => logs[key]);

        // Render newest first
        logsArray.sort((a, b) => b.createdAt - a.createdAt);

        logsArray.forEach((item) => {
          const formattedDate = new Date(item.createdAt).toLocaleString();
          const itemEl = document.createElement('div');
          itemEl.classList.add('history-item');

          itemEl.innerHTML = `
            <div class="item-meta">
              <span class="item-wallet">${item.wallet}</span>
              <span class="item-date">${formattedDate}</span>
            </div>
            <div class="item-status-col" style="text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
              <span style="font-size: 13.5px; font-weight: 600; color: var(--text-main);">$${Number(item.amount).toFixed(4)}</span>
              <span class="status-badge ${item.status.toLowerCase()}">${item.status}</span>
            </div>
          `;
          historyContainer.appendChild(itemEl);
        });
      });
    }

    // Sign out handler
    logoutBtn.addEventListener('click', () => {
      auth.signOut()
        .then(() => {
          window.location.href = 'index.html';
        })
        .catch(() => {
          showToast("Logout failed. Try again.");
        });
    });
  </script>
</body>
</html>
