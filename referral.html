<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Terminal - Unlimited Earning</title>
    
    <!-- 
    ======================================================
    PREMIUM ASSETS & EXTERNAL LIBRARIES
    ======================================================
    -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 
        ======================================================
        ADVANCED CSS ARCHITECTURE (150+ Lines)
        ======================================================
        */
        :root {
            --primary-blue: #4834d4;
            --secondary-blue: #686de0;
            --success-green: #2ecc71;
            --danger-red: #e74c3c;
            --warning-gold: #f1c40f;
            --bg-light: #f8faff;
            --white: #ffffff;
            --text-dark: #1e272e;
            --text-muted: #808e9b;
            --gradient-main: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            --shadow-card: 0 15px 40px rgba(72, 52, 212, 0.12);
            --shadow-sm: 0 5px 15px rgba(0, 0, 0, 0.05);
            --radius-lg: 40px;
            --radius-md: 25px;
        }

        /* Smoothing & Resets */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Animation Effects */
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes rotateSpinner {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-view { animation: fadeInSlide 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

        /* Header Premium Styling */
        .page-header {
            background: var(--gradient-main);
            padding: 60px 25px 120px 25px;
            color: var(--white);
            text-align: center;
            border-bottom-left-radius: 60px;
            border-bottom-right-radius: 60px;
            box-shadow: 0 15px 35px rgba(72, 52, 212, 0.25);
            position: relative;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 300;
            max-width: 80%;
            margin: 0 auto;
        }

        /* Main Content Grid */
        .content-area {
            padding: 0 20px;
            margin-top: -80px;
            flex-grow: 1;
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        /* Invite/Referral Code Card */
        .invite-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 40px 30px;
            box-shadow: var(--shadow-card);
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .invite-card .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        .referral-box {
            background: #f0f3ff;
            padding: 24px;
            border-radius: var(--radius-md);
            margin: 10px 0 25px 0;
            border: 2.5px dashed var(--primary-blue);
            font-size: 32px;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: 6px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        .referral-box:active { transform: scale(0.96); background: #e2e8ff; }
        .referral-box i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0.3;
        }

        .btn-action {
            width: 100%;
            padding: 20px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 12px 30px rgba(72, 52, 212, 0.3);
            transition: 0.4s;
        }
        .btn-action:hover { background: #341f97; transform: translateY(-2px); }

        /* Commission Rates Info Panel */
        .info-panel {
            background: var(--white);
            padding: 25px;
            border-radius: var(--radius-md);
            margin-bottom: 30px;
            box-shadow: var(--shadow-sm);
            border-left: 8px solid var(--primary-blue);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        .info-row span { font-size: 14px; color: var(--text-muted); font-weight: 600; }
        .info-row b { color: var(--primary-blue); font-size: 18px; font-weight: 800; }

        /* Stats Dashboard Section */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--white);
            padding: 28px 15px;
            border-radius: var(--radius-md);
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: 0.3s;
            border-bottom: 6px solid transparent;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card i { font-size: 28px; color: var(--primary-blue); margin-bottom: 12px; }
        .stat-card p { font-size: 11px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card h4 { font-size: 24px; font-weight: 800; color: var(--text-dark); }

        .active-widget { border-bottom-color: var(--primary-blue); }
        .earning-widget { border-bottom-color: var(--success-green); }

        /* Team List Layout */
        .team-title {
            font-size: 19px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 20px;
            padding-left: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .team-title i { color: var(--primary-blue); background: #f0edff; padding: 12px; border-radius: 15px; font-size: 18px; }

        .team-list-wrapper { display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px; }

        .partner-card {
            background: var(--white);
            padding: 22px 28px;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid #f2f2f2;
            animation: fadeInSlide 0.6s ease backwards;
        }

        /* --- UI CHANGE: ONLY NAME --- */
        .p-info h5 { font-size: 17px; font-weight: 800; color: #2d3436; }
        
        .status-tag {
            font-size: 11px;
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .status-active { background: #e3fcef; color: var(--success-green); box-shadow: 0 4px 10px rgba(46, 204, 113, 0.1); }
        .status-pending { background: #f1f2f6; color: #95a5a6; }

        /* Empty Handler */
        .empty-state { text-align: center; padding: 70px 20px; color: #bdc3c7; }
        .empty-state i { font-size: 60px; margin-bottom: 20px; opacity: 0.5; }

        /* Hidden link holder */
        #linkVault { display: none; }

        /* Toast Component */
        .toast-popup {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #2d3436; color: white; padding: 15px 35px; border-radius: 60px;
            font-size: 14px; z-index: 9999; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            font-weight: 500;
        }

    </style>
</head>
<body>

    <!-- Header Section -->
    <header class="page-header animate-view">
        <h1>Affiliate Network</h1>
        <p>Invite your direct partners and start earning daily commissions automatically.</p>
    </header>

    <div class="content-area">
        
        <!-- Invite Module Card -->
        <div class="invite-card animate-view" style="animation-delay: 0.1s;">
            <span class="label">My Referral ID</span>
            <div class="referral-box" id="refCardBody" onclick="copyToClipboard('refCardBody')">
                <span id="targetUID">UE----</span>
                <i class="far fa-copy"></i>
            </div>
            
            <!-- Specific Website Link Integrated -->
            <button class="btn-action" onclick="copyToClipboard('linkVault')">
                <i class="fas fa-link"></i> Copy Referral Link
            </button>
            <p id="linkVault" class="hidden-node"></p>
        </div>

        <!-- Bonus Rates Information Panel -->
        <div class="info-panel animate-view" style="animation-delay: 0.2s;">
            <div class="info-row">
                <span>Direct Commission (Level 1)</span>
                <b id="liveL1Rate">৳ 0</b>
            </div>
            <div class="info-row" style="margin-top: 5px; border-top: 1px solid #f8f8f8; padding-top: 12px;">
                <span>Indirect Team Bonus (Level 2)</span>
                <b id="liveL2Rate">৳ 0</b>
            </div>
        </div>

        <!-- Global Stats Grid -->
        <div class="stats-container animate-view" style="animation-delay: 0.3s;">
            <div class="stat-card active-widget">
                <i class="fas fa-users-check"></i>
                <p>Active Team</p>
                <h4 id="activeStatsLabel">0</h4>
            </div>
            <div class="stat-card earning-widget">
                <i class="fas fa-coins"></i>
                <p>Ref Total Earning</p>
                <h4 id="earningStatsLabel">৳ 0.00</h4>
            </div>
        </div>

        <!-- Team List Section -->
        <div class="team-title animate-view" style="animation-delay: 0.4s;">
            <i class="fas fa-user-group"></i> My Direct Team
        </div>

        <div class="team-list-wrapper" id="partnersContainer">
            <!-- Loading Indicator -->
            <div class="empty-state">
                <i class="fas fa-circle-notch fa-spin" style="animation: rotateSpinner 1s linear infinite;"></i>
                <p style="margin-top:15px; font-weight:500;">Connecting to cloud...</p>
            </div>
        </div>

    </div>

    <!-- Toast Message -->
    <div id="toast" class="toast-popup">Copied successfully!</div>

    <!-- 
    ======================================================
    FIREBASE LOGIC CORE (200+ Lines)
    ======================================================
    -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        /**
         * INITIALIZATION CONFIGURATION
         */
        const firebaseConfig = {
            apiKey: "AIzaSyAOdWqPh69SEG-Z6P71xL6jlcFcNb9gMNs",
            authDomain: "unlimited-earning-28639.firebaseapp.com",
            databaseURL: "https://unlimited-earning-28639-default-rtdb.firebaseio.com",
            projectId: "unlimited-earning-28639",
            storageBucket: "unlimited-earning-28639.firebasestorage.app",
            messagingSenderId: "1061620701842",
            appId: "1:1061620701842:web:80fab8608da73a3fdc244b"
        };

        // Initialize App
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let loggedInUser = "";

        /**
         * AUTH STATE WATCHER
         */
        auth.onAuthStateChanged(user => {
            if (user) {
                // Parsing phone from auth email
                loggedInUser = user.email.split('@')[0];
                console.log("Session Verified:", loggedInUser);
                launchReferralSystem();
            } else {
                window.location.href = "index.html";
            }
        });

        /**
         * LAUNCHER ENGINE
         */
        function launchReferralSystem() {
            // 1. Sync Live Admin Rates
            fetchLiveAdminRates();

            // 2. Sync Personal Records & ID
            fetchPersonalAccountStats();
        }

        /**
         * 1. SYNC LIVE RATES (Admin Data)
         */
        function fetchLiveAdminRates() {
            db.ref('settings/referral').on('value', snap => {
                if (snap.exists()) {
                    const rates = snap.val();
                    document.getElementById('liveL1Rate').innerText = "৳ " + (rates.directPrice || 0);
                    document.getElementById('liveL2Rate').innerText = "৳ " + (rates.downlinePrice || 0);
                }
            }, error => console.error("Database Connection Failure (Rates):", error));
        }

        /**
         * 2. SYNC USER DATA (ID & Real-time Total Earnings)
         */
        function fetchPersonalAccountStats() {
            db.ref('users/' + loggedInUser).on('value', snap => {
                const user = snap.val();
                if (!user) return;

                // Syncing UID Display
                const myUID = user.uid;
                document.getElementById('targetUID').innerText = myUID;
                
                // --- ATTACHING THE SPECIFIC GITHUB WEBSITE LINK ---
                const BASE_URL = "https://unlimited-earning.github.io/-/";
                const finalInviteLink = `${BASE_URL}?ref=${myUID}`;
                document.getElementById('linkVault').innerText = finalInviteLink;

                // Syncing Ref Total Earning (Direct + Downline)
                const grandTotalIncome = parseFloat(user.referralEarnings || 0);
                document.getElementById('earningStatsLabel').innerText = "৳ " + grandTotalIncome.toFixed(2);

                // Load Direct Partners (ID Hide Logic inside)
                monitorDirectTeam(myUID);
            });
        }

        /**
         * 3. MONITOR DIRECT TEAM (Team Grid & Hidden ID Logic)
         */
        function monitorDirectTeam(uid) {
            // Optimized query for team members
            db.ref('users').orderByChild('referBy').equalTo(uid.toString()).on('value', snap => {
                const partnerArea = document.getElementById('partnersContainer');
                let liveActiveCount = 0;
                partnerArea.innerHTML = "";

                if (!snap.exists()) {
                    partnerArea.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-users-slash"></i>
                            <p style="font-size:14px; color:#999; margin-top:10px;">You haven't referred anyone yet.</p>
                            <p style="font-size:11px; color:#ccc;">Invite your friends using your link!</p>
                        </div>`;
                    document.getElementById('activeStatsLabel').innerText = "0";
                    return;
                }

                // Building the list dynamically
                snap.forEach(child => {
                    const person = child.val();
                    const isActive = (person.status === "active");
                    
                    if (isActive) liveActiveCount++;

                    // Creating Card Object
                    const card = document.createElement('div');
                    card.className = "partner-card animate-view";
                    
                    /**
                     * IMPORTANT: THE PHONE/ACCOUNT ID IS NOW COMPLETELY REMOVED FROM DISPLAY
                     * AS PER USER REQUEST. ONLY NAME AND STATUS TAGS ARE VISIBLE.
                     */
                    card.innerHTML = `
                        <div class="p-info">
                            <h5>${person.name}</h5>
                        </div>
                        <div class="status-tag ${isActive ? 'status-active' : 'status-pending'}">
                            ${isActive ? 'Active' : 'Unactive'}
                        </div>
                    `;
                    partnerArea.appendChild(card);
                });

                // Update Active Counter Label
                document.getElementById('activeStatsLabel').innerText = liveActiveCount;
                console.log("Team List Updated. Active count:", liveActiveCount);
            });
        }

        /**
         * UTILITY: PRO CLIPBOARD COPY
         */
        function copyToClipboard(id) {
            const rawValue = document.getElementById(id).innerText;
            // Sanitizing string
            const cleanStr = rawValue.replace(/[^a-zA-Z0-9:/._?=-]/g, '').trim();

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(cleanStr).then(() => {
                    displayToastNotification();
                }).catch(err => {
                    console.error("Async Copy Failed:", err);
                    executeLegacyCopy(cleanStr);
                });
            } else {
                executeLegacyCopy(cleanStr);
            }
        }

        /**
         * FALLBACK: LEGACY CLIPBOARD METHOD
         */
        function executeLegacyCopy(str) {
            const dummy = document.createElement("textarea");
            dummy.value = str;
            document.body.appendChild(dummy);
            dummy.select();
            try {
                document.execCommand('copy');
                displayToastNotification();
            } catch (err) {
                console.error('Legacy Copy Failed:', err);
            }
            document.body.removeChild(dummy);
        }

        /**
         * NOTIFICATION: TOAST POPUP UI
         */
        function displayToastNotification() {
            const toast = document.getElementById('toast');
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 2500);
        }

    </script>
</body>
</html>
