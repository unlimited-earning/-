<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer & Earn - Unlimited Earning</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #ff007a;
            --success: #00ff88;
            --bg: #0b0e1a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: radial-gradient(circle at top left, #1a1c2c, #0b0e1a);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Header Styling */
        .header {
            width: 100%;
            max-width: 500px;
            padding: 25px 20px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(11, 14, 26, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .back-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .header h1 {
            flex-grow: 1;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Stats Cards */
        .stats-grid {
            width: 90%;
            max-width: 450px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.1), transparent);
            pointer-events: none;
        }

        .stat-card p { font-size: 11px; color: #aaa; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h3 { font-size: 20px; color: var(--success); font-weight: 700; }

        /* Main Invite Card */
        .invite-box {
            width: 90%;
            max-width: 450px;
            background: linear-gradient(160deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            margin-top: 25px;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .invite-box h2 { font-size: 16px; margin-bottom: 20px; text-align: center; color: var(--primary); }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; margin-left: 5px; }

        .copy-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            padding: 12px 15px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }

        .copy-field:focus-within { border-color: var(--primary); }

        .copy-field input {
            background: none;
            border: none;
            color: #efefef;
            font-size: 14px;
            width: 85%;
            outline: none;
        }

        .copy-btn {
            color: var(--primary);
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            transition: 0.2s;
        }

        .copy-btn:active { transform: scale(0.8); }

        /* Referral List Section */
        .list-section {
            width: 90%;
            max-width: 450px;
            margin: 30px 0;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .list-header h4 { font-size: 15px; color: #eee; }
        .total-badge {
            background: var(--primary);
            color: #000;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .user-list { display: flex; flex-direction: column; gap: 10px; }

        .user-card {
            background: var(--glass);
            padding: 15px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            border: 1px solid var(--glass-border);
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .user-avatar {
            width: 45px; height: 45px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px; margin-right: 15px;
        }

        .user-details { flex-grow: 1; }
        .user-details b { display: block; font-size: 15px; margin-bottom: 2px; }
        .user-details span { font-size: 11px; color: var(--success); background: rgba(0, 255, 136, 0.1); padding: 2px 8px; border-radius: 10px; }

        .user-earning { text-align: right; }
        .user-earning .amt { display: block; font-weight: 700; color: var(--primary); }
        .user-earning .label { font-size: 10px; color: #777; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #555;
        }
        .empty-state i { font-size: 40px; margin-bottom: 10px; }

        /* Toast Notification */
        #toast {
            position: fixed; bottom: 30px; background: var(--primary); color: #000;
            padding: 10px 25px; border-radius: 30px; font-weight: 600;
            transform: translateY(100px); transition: 0.4s; z-index: 1000;
        }
        #toast.show { transform: translateY(0); }

    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="location.href='home.html'"><i class="fas fa-chevron-left"></i></button>
        <h1>Referral Rewards</h1>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <p>Active Reward</p>
            <h3 id="ref-price">৳0</h3>
        </div>
        <div class="stat-card">
            <p>Downline Bonus</p>
            <h3 id="down-price">৳0</h3>
        </div>
    </div>

    <!-- Invite Section -->
    <div class="invite-box">
        <h2>Invite Your Friends</h2>
        
        <div class="input-group">
            <label>Your Referral Code</label>
            <div class="copy-field">
                <input type="text" id="my-code" readonly value="Loading...">
                <i class="fas fa-copy copy-btn" onclick="copyText('my-code')"></i>
            </div>
        </div>

        <div class="input-group">
            <label>Your Unique Invite Link</label>
            <div class="copy-field">
                <input type="text" id="my-link" readonly value="Loading...">
                <i class="fas fa-link copy-btn" onclick="copyText('my-link')"></i>
            </div>
        </div>
    </div>

    <!-- Referrals List -->
    <div class="list-section">
        <div class="list-header">
            <h4>My Active Referrals</h4>
            <span class="total-badge" id="ref-count">0 Active</span>
        </div>
        
        <div id="user-list" class="user-list">
            <!-- Dynamic Users -->
            <div class="empty-state">
                <i class="fas fa-users-slash"></i>
                <p>No active referrals yet.<br>Invite friends to start earning!</p>
            </div>
        </div>
    </div>

    <div id="toast">Copied to Clipboard!</div>

<script>
    // --- Firebase Configuration ---
    const firebaseConfig = {
      apiKey: "AIzaSyBFPd0umYUjpFBH08GNhpvjPA00kTh6Y5c",
      authDomain: "unlimited-73d64.firebaseapp.com",
      databaseURL: "https://unlimited-73d64-default-rtdb.firebaseio.com",
      projectId: "unlimited-73d64",
      storageBucket: "unlimited-73d64.firebasestorage.app",
      messagingSenderId: "1089467648940",
      appId: "1:1089467648940:web:ed748a5a93b27ee408c809"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Check Auth Status
    auth.onAuthStateChanged(user => {
        if (user) {
            initReferralPage(user);
        } else {
            window.location.href = 'index.html';
        }
    });

    async function initReferralPage(user) {
        // 1. Get current user's name to use as Referral Code
        db.ref('users/' + user.uid).on('value', snap => {
            const userData = snap.val();
            if(userData) {
                const userName = userData.name;
                document.getElementById('my-code').value = userName;
                
                // Construct link: domain/index.html?ref=Name
                const inviteLink = window.location.origin + "/index.html?ref=" + encodeURIComponent(userName);
                document.getElementById('my-link').value = inviteLink;
                
                // 2. Load Downline based on Name
                loadDownline(userName);
            }
        });

        // 3. Load Admin Settings (Rates)
        db.ref('admin_settings/referral').on('value', snap => {
            const rates = snap.val();
            if(rates) {
                document.getElementById('ref-price').innerText = "৳" + (rates.currentPrice || 0);
                document.getElementById('down-price').innerText = "৳" + (rates.downlinePrice || 0);
            }
        });
    }

    function loadDownline(myName) {
        const listContainer = document.getElementById('user-list');
        const countBadge = document.getElementById('ref-count');

        // Query users where referralBy == myName
        db.ref('users').orderByChild('referralBy').equalTo(myName).on('value', snap => {
            listContainer.innerHTML = "";
            let activeCount = 0;

            if(snap.exists()) {
                snap.forEach(child => {
                    const data = child.val();
                    
                    // Logic: Only show/count if status is 'active' (2 tasks complete)
                    if(data.status === 'active') {
                        activeCount++;
                        
                        const firstLetter = data.name.charAt(0).toUpperCase();
                        const userCard = `
                            <div class="user-card">
                                <div class="user-avatar">${firstLetter}</div>
                                <div class="user-details">
                                    <b>${data.name}</b>
                                    <span><i class="fas fa-check-circle"></i> Active Member</span>
                                </div>
                                <div class="user-earning">
                                    <span class="amt">৳${data.balance || 0}</span>
                                    <span class="label">Balance</span>
                                </div>
                            </div>
                        `;
                        listContainer.innerHTML += userCard;
                    }
                });

                countBadge.innerText = activeCount + " Active";
                
                if(activeCount === 0) {
                    showEmptyState(listContainer);
                }
            } else {
                showEmptyState(listContainer);
                countBadge.innerText = "0 Active";
            }
        });
    }

    function showEmptyState(container) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-users-slash"></i>
                <p>No active referrals yet.<br>Invite friends to start earning!</p>
            </div>
        `;
    }

    // Utility: Copy Text
    function copyText(id) {
        const input = document.getElementById(id);
        input.select();
        input.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(input.value);
        
        const toast = document.getElementById('toast');
        toast.innerText = "Copied: " + input.value;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }
</script>

</body>
</html>
