<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TNMINING - Mining Nodes</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #020009;
      --bg-secondary: #09041a;
      --bg-card: rgba(13, 6, 30, 0.65);
      --border-color: rgba(168, 85, 247, 0.2);
      --primary: #a855f7;
      --secondary: #06b6d4;
      --gold: #fbbf24;
      --gold-glow: rgba(251, 191, 36, 0.35);
      --primary-glow: rgba(168, 85, 247, 0.3);
      --secondary-glow: rgba(6, 182, 212, 0.2);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-primary);
      background-image: 
        radial-gradient(circle at 50% -20%, var(--primary-glow) 0%, transparent 60%),
        radial-gradient(circle at 10% 100%, var(--secondary-glow) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 95px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Page Header */
    .page-header {
      text-align: center;
      margin-bottom: 20px;
      padding-top: 10px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .page-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Power Allocation Hero Card */
    .power-hero-card {
      background: radial-gradient(circle at 50% 0%, rgba(24, 12, 54, 0.6) 0%, rgba(9, 4, 25, 0.9) 100%);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 22px 18px;
      margin-bottom: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
    }

    .hero-stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      text-align: center;
    }

    .hero-metric {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hero-metric-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .hero-metric-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
    }

    .hero-metric-value.purple { color: var(--primary); }
    .hero-metric-value.cyan { color: var(--secondary); }
    .hero-metric-value.gold { color: var(--gold); }

    /* Start Session Button Block */
    .trigger-container {
      margin-bottom: 24px;
    }

    .btn-deploy-node {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      border-radius: 20px;
      color: white;
      font-weight: 800;
      font-size: 14.5px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.35);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-deploy-node:disabled {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-deploy-node:active:not(:disabled) {
      transform: scale(0.97);
    }

    /* Active Session Stream List */
    .section-header-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .streams-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Beautiful Node Card layout */
    .stream-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 22px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .stream-card.completed {
      border-color: rgba(251, 191, 36, 0.3);
      box-shadow: 0 8px 25px var(--gold-glow);
    }

    .stream-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stream-title-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stream-pulse-core {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--secondary);
      box-shadow: 0 0 10px var(--secondary);
      animation: pulse-stream-dot 1.5s infinite;
    }

    .completed .stream-pulse-core {
      background-color: var(--gold);
      box-shadow: 0 0 12px var(--gold);
      animation: none;
    }

    @keyframes pulse-stream-dot {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    .stream-title {
      font-size: 13.5px;
      font-weight: 700;
    }

    .stream-power-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(168, 85, 247, 0.08);
      border: 1px solid rgba(168, 85, 247, 0.2);
      padding: 2px 8px;
      border-radius: 12px;
    }

    /* Yield progress visualizers */
    .stream-body {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stream-ticker-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stream-ticker-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .stream-ticker-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--secondary);
    }

    .completed .stream-ticker-val {
      color: var(--gold);
    }

    .stream-timer {
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
    }

    .stream-progress-track {
      width: 100%;
      background: rgba(255,255,255,0.03);
      height: 6px;
      border-radius: 10px;
      overflow: hidden;
    }

    .stream-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 10px;
      transition: width 1s linear;
    }

    .completed .stream-progress-bar {
      background: linear-gradient(90deg, var(--gold), #d97706);
    }

    /* Card Claim Trigger Button */
    .btn-claim-stream {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, var(--gold) 0%, #d97706 100%);
      border: none;
      border-radius: 14px;
      color: #000;
      font-weight: 800;
      font-size: 12.5px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(251, 191, 36, 0.25);
      transition: all 0.2s ease;
    }

    .btn-claim-stream:active {
      transform: scale(0.97);
    }

    .empty-streams-card {
      background: var(--bg-card);
      border: 1px dashed var(--border-color);
      border-radius: 22px;
      padding: 35px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .empty-streams-card i {
      font-size: 28px;
      color: rgba(168, 85, 247, 0.4);
      margin-bottom: 12px;
    }

    /* Bottom Nav Menu */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: rgba(5, 2, 15, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(168, 85, 247, 0.12);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 999;
      padding: 0 10px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-muted);
      width: 60px;
      transition: all 0.2s ease;
    }

    .nav-item i { font-size: 19px; }
    .nav-item span { font-size: 10px; font-weight: 500; }
    .nav-item.active { color: var(--primary); }

    .nav-item-mining {
      position: relative;
      top: -16px;
      width: 62px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff !important;
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4);
      border: 4.5px solid var(--bg-primary);
    }

    .nav-item-mining i {
      font-size: 22px;
    }

    /* Toasts Alerts */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(18, 10, 36, 0.95);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 12px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast.show { transform: translateX(0); }
    .toast.error { border-left: 4px solid var(--error); }
    .toast.success { border-left: 4px solid var(--success); }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Title Area -->
    <div class="page-header">
      <h1 class="page-title">Deploy Mining Nodes</h1>
      <p class="page-subtitle">Deploy idle chunks of 1,000 POWER into active 5H hashing streams</p>
    </div>

    <!-- Power Allocation Summary -->
    <div class="power-hero-card">
      <div class="hero-stat-row">
        <div class="hero-metric">
          <span class="hero-metric-label">Total Power</span>
          <span class="hero-metric-value purple" id="totalPowerDisplay">0 HP</span>
        </div>
        <div class="hero-metric">
          <span class="hero-metric-label">In Session</span>
          <span class="hero-metric-value cyan" id="allocatedPowerDisplay">0 HP</span>
        </div>
        <div class="hero-metric">
          <span class="hero-metric-label">Idle Power</span>
          <span class="hero-metric-value gold" id="idlePowerDisplay">0 HP</span>
        </div>
      </div>
    </div>

    <!-- Core Deployment Controller Trigger -->
    <div class="trigger-container">
      <button class="btn-deploy-node" id="deployStreamBtn">
        <i class="fa-solid fa-square-plus"></i>
        <span>Deploy Node Core (-1,000 HP)</span>
      </button>
    </div>

    <!-- Active Streams ledger -->
    <h2 class="section-header-title">Active Hashing Streams</h2>
    <div class="streams-list" id="streamsContainer">
      <div class="empty-streams-card">
        <i class="fa-solid fa-microchip"></i>
        <p>No active cores initialized. Deploy an idle chunk to begin mining.</p>
      </div>
    </div>

  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="task.html" class="nav-item">
      <i class="fa-solid fa-list-check"></i>
      <span>Tasks</span>
    </a>
    <a href="mining.html" class="nav-item-mining">
      <i class="fa-solid fa-circle-notch"></i>
    </a>
    <a href="referral.html" class="nav-item">
      <i class="fa-solid fa-user-group"></i>
      <span>Referral</span>
    </a>
    <a href="account.html" class="nav-item">
      <i class="fa-solid fa-user"></i>
      <span>Account</span>
    </a>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase Legacy Compat Libraries -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDuQICVoC10i62PQMS6cX37t1eoeTg5zsc",
      authDomain: "mining-c7b26.firebaseapp.com",
      databaseURL: "https://mining-c7b26-default-rtdb.firebaseio.com",
      projectId: "mining-c7b26",
      storageBucket: "mining-c7b26.firebasestorage.app",
      messagingSenderId: "873757658723",
      appId: "1:873757658723:web:18a4af95953a08b440b256"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();

    // DOM Elements
    const totalPowerDisplay = document.getElementById('totalPowerDisplay');
    const allocatedPowerDisplay = document.getElementById('allocatedPowerDisplay');
    const idlePowerDisplay = document.getElementById('idlePowerDisplay');
    const deployStreamBtn = document.getElementById('deployStreamBtn');
    const streamsContainer = document.getElementById('streamsContainer');
    const toastContainer = document.getElementById('toastContainer');

    let currentUser = null;
    let userData = null;
    let activeSessionsList = {};
    let tickerInterval = null;

    const CYCLE_SECS = 5 * 60 * 60; // 5 Hours (18000s)

    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
      } else {
        currentUser = user;
        bindMiningSystem();
      }
    });

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.classList.add('toast', type);
      const icon = type === 'success' ? 'fa-circle-check' : 'fa-triangle-exclamation';
      toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 50);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    function bindMiningSystem() {
      // 1. Sync User Core statistics
      db.ref(`Users/${currentUser.uid}`).on('value', (snapshot) => {
        if (!snapshot.exists()) return;
        userData = snapshot.val();

        // 2. Fetch Sessions list
        db.ref(`Users/${currentUser.uid}/activeSessions`).on('value', (sessionSnap) => {
          activeSessionsList = sessionSnap.exists() ? sessionSnap.val() : {};
          
          calculatePowerAllocations();
          renderMiningStreams();
        });
      });
    }

    function calculatePowerAllocations() {
      const totalPower = parseInt(userData.power || 1000);
      
      // Calculate allocation from active database list
      let allocatedPower = 0;
      Object.keys(activeSessionsList).forEach((key) => {
        allocatedPower += parseInt(activeSessionsList[key].powerAllocated || 1000);
      });

      const idlePower = Math.max(0, totalPower - allocatedPower);

      totalPowerDisplay.textContent = `${Number(totalPower).toLocaleString()} HP`;
      allocatedPowerDisplay.textContent = `${Number(allocatedPower).toLocaleString()} HP`;
      idlePowerDisplay.textContent = `${Number(idlePower).toLocaleString()} HP`;

      // Check if user has enough idle power (Min 1,000 HP required) to Deploy Node
      if (idlePower >= 1000) {
        deployStreamBtn.disabled = false;
      } else {
        deployStreamBtn.disabled = true;
      }

      // Legacy state match logic for Online marker synchronization in home.html
      const hasActiveStreams = Object.keys(activeSessionsList).length > 0;
      db.ref(`Users/${currentUser.uid}`).update({
        miningStatus: hasActiveStreams ? 'active' : 'idle',
        miningStartTime: hasActiveStreams ? Object.values(activeSessionsList)[0].startTime : 0
      });
    }

    // Deploy a new independent mining block session
    deployStreamBtn.addEventListener('click', () => {
      if (deployStreamBtn.disabled) return;
      deployStreamBtn.disabled = true;

      // Double-verify current stats
      const totalPower = parseInt(userData.power || 1000);
      let allocatedPower = 0;
      Object.keys(activeSessionsList).forEach((key) => {
        allocatedPower += parseInt(activeSessionsList[key].powerAllocated || 1000);
      });
      const idlePower = totalPower - allocatedPower;

      if (idlePower < 1000) {
        showToast("Insufficient idle power. Upgrade hashrate to start more streams.", "error");
        return;
      }

      // Initialize a new independent Session block
      const sessionRef = db.ref(`Users/${currentUser.uid}/activeSessions`).push();
      const newSession = {
        id: sessionRef.key,
        powerAllocated: 1000,
        startTime: Date.now()
      };

      sessionRef.set(newSession)
        .then(() => {
          showToast("Hashing Core Initialized! Mining Node started.", "success");
        })
        .catch(() => {
          showToast("Failed to initiate stream.", "error");
          deployStreamBtn.disabled = false;
        });
    });

    // Render Stream panels with independent Ticker clocks
    function renderMiningStreams() {
      if (tickerInterval) clearInterval(tickerInterval);

      const keys = Object.keys(activeSessionsList);
      if (keys.length === 0) {
        streamsContainer.innerHTML = `
          <div class="empty-streams-card">
            <i class="fa-solid fa-microchip"></i>
            <p>No active cores initialized. Deploy an idle chunk to begin mining.</p>
          </div>
        `;
        return;
      }

      let streamsHTML = "";
      keys.forEach((key) => {
        const session = activeSessionsList[key];
        streamsHTML += `
          <div class="stream-card" id="card_${session.id}">
            <div class="stream-header">
              <div class="stream-title-block">
                <span class="stream-pulse-core"></span>
                <span class="stream-title">Stream Core Node</span>
              </div>
              <span class="stream-power-badge">1,000 HP Block</span>
            </div>
            
            <div class="stream-body">
              <div class="stream-ticker-col">
                <span class="stream-ticker-label" id="label_${session.id}">Yellow Yields</span>
                <span class="stream-ticker-val" id="ticker_${session.id}">$0.00000000</span>
              </div>
              <span class="stream-timer" id="timer_${session.id}">05:00:00</span>
            </div>

            <div class="stream-progress-track">
              <div class="stream-progress-bar" id="bar_${session.id}"></div>
            </div>

            <button class="btn-claim-stream" id="btn_${session.id}" style="display:none;" onclick="claimStreamYield('${session.id}')">
              Claim Stream Yields
            </button>
          </div>
        `;
      });

      streamsContainer.innerHTML = streamsHTML;

      // Start the master dynamic clock synchronization loop
      const runStreamsTimer = () => {
        const now = Date.now();

        keys.forEach((key) => {
          const session = activeSessionsList[key];
          const cardEl = document.getElementById(`card_${session.id}`);
          const tickerEl = document.getElementById(`ticker_${session.id}`);
          const timerEl = document.getElementById(`timer_${session.id}`);
          const barEl = document.getElementById(`bar_${session.id}`);
          const btnEl = document.getElementById(`btn_${session.id}`);
          const labelEl = document.getElementById(`label_${session.id}`);

          if (!cardEl || !tickerEl || !timerEl || !barEl || !btnEl) return;

          let elapsedSecs = Math.max(0, Math.floor((now - parseInt(session.startTime)) / 1000));

          if (elapsedSecs >= CYCLE_SECS) {
            // Completed Stream state
            cardEl.classList.add('completed');
            tickerEl.textContent = "$0.00025000"; // Fixed 1 claim = $0.00025 per 1,000 POWER session
            timerEl.textContent = "Finished";
            barEl.style.width = "100%";
            btnEl.style.display = "block";
            labelEl.textContent = "Reward Ready";
          } else {
            // Processing Stream state
            const progressPct = (elapsedSecs / CYCLE_SECS) * 100;
            barEl.style.width = `${progressPct}%`;

            // Calculate precise ticker: $0.00025 maximum reward divided over 18,000s duration
            const accumulationYield = elapsedSecs * (0.00025 / CYCLE_SECS);
            tickerEl.textContent = `$${accumulationYield.toFixed(8)}`;

            const remaining = CYCLE_SECS - elapsedSecs;
            const hours = Math.floor(remaining / 3600).toString().padStart(2, '0');
            const mins = Math.floor((remaining % 3600) / 60).toString().padStart(2, '0');
            const secs = (remaining % 60).toString().padStart(2, '0');
            timerEl.textContent = `${hours}:${mins}:${secs}`;
            btnEl.style.display = "none";
          }
        });
      };

      runStreamsTimer();
      tickerInterval = setInterval(runStreamsTimer, 1000);
    }

    // Process secure payouts of completed session streams
    window.claimStreamYield = function(sessionId) {
      const session = activeSessionsList[sessionId];
      if (!session) return;

      const elapsed = Math.floor((Date.now() - parseInt(session.startTime)) / 1000);
      if (elapsed < CYCLE_SECS) {
        showToast("Stream Core is still actively processing.");
        return;
      }

      const claimBtn = document.getElementById(`btn_${sessionId}`);
      if (claimBtn) claimBtn.disabled = true;

      // Yield values: exactly $0.00025 per 1,000 POWER session cycle
      const rewardAmt = 0.00025;

      const userRef = db.ref(`Users/${currentUser.uid}`);
      userRef.transaction((curr) => {
        if (curr) {
          curr.balance = parseFloat(curr.balance || 0) + rewardAmt;
          curr.totalEarnings = parseFloat(curr.totalEarnings || 0) + rewardAmt;
          curr.todayEarnings = parseFloat(curr.todayEarnings || 0) + rewardAmt;
          curr.completedMiningCycles = (curr.completedMiningCycles || 0) + 1;
        }
        return curr;
      }, async (error, committed) => {
        if (committed) {
          // Remove session log upon success
          await db.ref(`Users/${currentUser.uid}/activeSessions/${sessionId}`).remove();
          showToast(`Stream yields claimed successfully! +$${rewardAmt.toFixed(5)} added.`, "success");

          // Execute standard referral validation check (for validation mapping & milestones)
          const referrerUid = userData.referredBy;
          if (referrerUid) {
            const referralRef = db.ref(`Referrals/${referrerUid}/${currentUser.uid}`);
            const snap = await referralRef.get();
            
            if (snap.exists()) {
              const refData = snap.val();
              const newCycles = (refData.miningCyclesCompleted || 0) + 1;
              let refStatus = refData.status || "Pending";
              let extraPower = 0;
              let payload = { miningCyclesCompleted: newCycles };

              if (refStatus === "Pending") {
                refStatus = "Valid";
                extraPower += 1000; // Credit Referrer with +1000 POWER base reward
                payload.status = "Valid";
                payload.powerGained = 1000;
              }

              if (newCycles >= 10 && !refData.bonus2kClaimed) {
                extraPower += 2000; // Award extra premium +2,000 POWER Milestone Reward
                payload.bonus2kClaimed = true;
                payload.powerGained = (refData.powerGained || 1000) + 2000;
              }

              await referralRef.update(payload);

              if (extraPower > 0) {
                const refUserRef = db.ref(`Users/${referrerUid}`);
                await refUserRef.transaction((refUser) => {
                  if (refUser) {
                    refUser.power = (refUser.power || 1000) + extraPower;
                    if (payload.status === "Valid") {
                      refUser.referralsCount = (refUser.referralsCount || 0) + 1;
                    }
                  }
                  return refUser;
                });
              }
            }
          }
        } else {
          showToast("Failed to process stream payout.", "error");
          if (claimBtn) claimBtn.disabled = false;
        }
      });
    };

    window.addEventListener('beforeunload', () => {
      if (tickerInterval) clearInterval(tickerInterval);
    });
  </script>
</body>
</html>
