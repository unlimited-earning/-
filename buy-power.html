<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TNMINING - Buy Power</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #05020c;
      --bg-secondary: #0d061f;
      --bg-card: rgba(18, 10, 36, 0.65);
      --border-color: rgba(168, 85, 247, 0.2);
      --border-focus: rgba(6, 182, 212, 0.6);
      --primary: #a855f7;
      --secondary: #06b6d4;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --error: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-primary);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 100px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* Page Header */
    .page-title-section {
      text-align: center;
      margin-bottom: 22px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
    }

    .page-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Balance Banner */
    .balance-banner {
      background: rgba(13, 6, 31, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .bal-label-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .bal-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .bal-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--secondary);
    }

    .power-val {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
    }

    /* Packages grid listing */
    .packages-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .package-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }

    .package-card:hover {
      border-color: var(--secondary);
      transform: translateY(-2px);
    }

    .package-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .package-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
    }

    .package-badge {
      background: rgba(6, 182, 212, 0.15);
      border: 1px solid var(--secondary);
      color: var(--secondary);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .power-amount {
      font-size: 24px;
      font-family: 'Share Tech Mono', monospace;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .yield-breakdown {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 18px;
    }

    .yield-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 4px 0;
      color: var(--text-muted);
    }

    .yield-val {
      font-weight: 500;
      color: var(--text-main);
    }

    .package-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    .price-tag {
      display: flex;
      flex-direction: column;
    }

    .price-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .price-val {
      font-size: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-weight: 700;
      color: #fff;
    }

    .btn-buy-package {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 13.5px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.25);
      transition: all 0.2s ease;
    }

    .btn-buy-package:active {
      transform: scale(0.97);
    }

    /* Modal Checkout Card */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 2, 12, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      width: 100%;
      max-width: 380px;
      padding: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 12px;
      text-align: center;
    }

    .modal-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 12.5px;
    }

    .modal-detail-row:last-of-type {
      border-bottom: none;
      margin-bottom: 18px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .btn-modal {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    .btn-confirm {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: #fff;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Bottom Navigation Bar Styles */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(13, 6, 31, 0.9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(168, 85, 247, 0.15);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 999;
      padding: 0 10px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-muted);
      width: 60px;
      transition: all 0.2s ease;
    }

    .nav-item i { font-size: 18px; }
    .nav-item span { font-size: 10px; font-weight: 500; }
    .nav-item.active { color: var(--primary); }

    /* Center floating button */
    .nav-item-mining {
      position: relative;
      top: -15px;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff !important;
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.45);
      border: 4px solid var(--bg-primary);
    }

    .nav-item-mining i {
      font-size: 24px;
    }

    /* Toast elements */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(18, 10, 36, 0.95);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 12px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast.show { transform: translateX(0); }
    .toast.error { border-left: 4px solid var(--error); }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error i { color: var(--error); }
    .toast.success i { color: var(--success); }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Title Area -->
    <div class="page-title-section">
      <h1 class="page-title">Hashrate Market</h1>
      <p class="page-subtitle">Purchase cloud packages to boost your mining yields</p>
    </div>

    <!-- Available balance overview -->
    <div class="balance-banner">
      <div class="bal-label-col">
        <span class="bal-label">Available Earnings</span>
        <span class="bal-val" id="localBalanceDisplay">$0.00000000</span>
      </div>
      <div class="bal-label-col" style="text-align: right;">
        <span class="bal-label">Current Power</span>
        <span class="power-val" id="localPowerDisplay">0 HP</span>
      </div>
    </div>

    <!-- Packages listing grids -->
    <div class="packages-grid" id="packagesContainer">
      <div class="empty-state">Loading packages...</div>
    </div>

  </div>

  <!-- Payout confirmation modal overlay -->
  <div class="modal-overlay" id="checkoutModal">
    <div class="modal-card">
      <h3 class="modal-title">Confirm Checkout</h3>
      
      <div class="modal-detail-row">
        <span class="modal-label">Product Package</span>
        <span class="modal-val" id="checkoutTitle">-</span>
      </div>
      <div class="modal-detail-row">
        <span class="modal-label">Power Credit</span>
        <span class="modal-val" id="checkoutPower">-</span>
      </div>
      <div class="modal-detail-row">
        <span class="modal-label">Required Price</span>
        <span class="modal-val" id="checkoutPrice">-</span>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-modal btn-cancel" id="cancelBtn">Cancel</button>
        <button type="button" class="btn-modal btn-confirm" id="confirmBtn">Complete Order</button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation Menu -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="task.html" class="nav-item">
      <i class="fa-solid fa-list-check"></i>
      <span>Tasks</span>
    </a>
    <a href="mining.html" class="nav-item-mining">
      <i class="fa-solid fa-circle-notch"></i>
    </a>
    <a href="referral.html" class="nav-item">
      <i class="fa-solid fa-user-group"></i>
      <span>Referral</span>
    </a>
    <a href="account.html" class="nav-item">
      <i class="fa-solid fa-user"></i>
      <span>Account</span>
    </a>
  </nav>

  <!-- Notification Alerts -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDuQICVoC10i62PQMS6cX37t1eoeTg5zsc",
      authDomain: "mining-c7b26.firebaseapp.com",
      databaseURL: "https://mining-c7b26-default-rtdb.firebaseio.com",
      projectId: "mining-c7b26",
      storageBucket: "mining-c7b26.firebasestorage.app",
      messagingSenderId: "873757658723",
      appId: "1:873757658723:web:18a4af95953a08b440b256"
    };

    // Initialize
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();

    // DOM Elements
    const toastContainer = document.getElementById('toastContainer');
    const localBalanceDisplay = document.getElementById('localBalanceDisplay');
    const localPowerDisplay = document.getElementById('localPowerDisplay');
    const packagesContainer = document.getElementById('packagesContainer');

    // Checkout modal elements
    const checkoutModal = document.getElementById('checkoutModal');
    const checkoutTitle = document.getElementById('checkoutTitle');
    const checkoutPower = document.getElementById('checkoutPower');
    const checkoutPrice = document.getElementById('checkoutPrice');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');

    let currentUser = null;
    let userData = null;
    let localBalance = 0;
    let selectedPackObj = null;

    // Route Guard check
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
      } else {
        currentUser = user;
        bindUserMetrics();
        bindPackagesGrid();
      }
    });

    // Custom alerts
    function showToast(message, type = 'error') {
      const toast = document.createElement('div');
      toast.classList.add('toast', type);
      const icon = type === 'success' ? 'fa-circle-check' : 'fa-triangle-exclamation';
      toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 50);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Connect user profiles
    function bindUserMetrics() {
      db.ref(`Users/${currentUser.uid}`).on('value', (snapshot) => {
        if (!snapshot.exists()) return;
        userData = snapshot.val();
        localBalance = parseFloat(userData.balance || 0);
        
        localBalanceDisplay.textContent = `$${localBalance.toFixed(8)}`;
        localPowerDisplay.textContent = `${Number(userData.power || 1000).toLocaleString()} HP`;
      });
    }

    // Connect and seed packages
    function bindPackagesGrid() {
      db.ref('BuyPowerPackages').on('value', (snapshot) => {
        if (!snapshot.exists()) {
          // Seed initial default packs
          const defaultPacks = {
            "p_micro": { id: "p_micro", title: "Micro Grid Node", power: 2000, price: 1.00 },
            "p_cyber": { id: "p_cyber", title: "Cyber Hash Core", power: 11000, price: 5.00 },
            "p_quantum": { id: "p_quantum", title: "Quantum Cluster", power: 50000, price: 20.00 },
            "p_giga": { id: "p_giga", title: "Mega Cloud Server", power: 150000, price: 50.00 }
          };
          db.ref('BuyPowerPackages').set(defaultPacks);
          return;
        }

        const packages = snapshot.val();
        let packsHTML = "";

        Object.keys(packages).forEach((key) => {
          const pack = packages[key];
          
          // Yield breakdowns: 1000 POWER = $0.001 per day
          const dayYield = pack.power * 0.000001;
          const monthYield = dayYield * 30;
          const yearYield = dayYield * 365;

          packsHTML += `
            <div class="package-card">
              <div class="package-header">
                <span class="package-title">${pack.title}</span>
                <span class="package-badge">Standard Tier</span>
              </div>
              <div class="power-amount">
                <i class="fa-solid fa-bolt"></i> +${Number(pack.power).toLocaleString()} HP
              </div>
              <div class="yield-breakdown">
                <div class="yield-row"><span>Daily Income</span><span class="yield-val">+$${dayYield.toFixed(4)}</span></div>
                <div class="yield-row"><span>Monthly Income</span><span class="yield-val">+$${monthYield.toFixed(4)}</span></div>
                <div class="yield-row"><span>Yearly Income</span><span class="yield-val">+$${yearYield.toFixed(4)}</span></div>
              </div>
              <div class="package-footer">
                <div class="price-tag">
                  <span class="price-label">Price</span>
                  <span class="price-val">$${Number(pack.price).toFixed(2)}</span>
                </div>
                <button class="btn-buy-package" onclick="openCheckoutModal('${key}')">Purchase Package</button>
              </div>
            </div>
          `;
        });

        packagesContainer.innerHTML = packsHTML;
      });
    }

    // Open checkout verification modal
    function openCheckoutModal(packId) {
      db.ref(`BuyPowerPackages/${packId}`).once('value', (snapshot) => {
        if (!snapshot.exists()) return;
        selectedPackObj = snapshot.val();

        checkoutTitle.textContent = selectedPackObj.title;
        checkoutPower.textContent = `+${Number(selectedPackObj.power).toLocaleString()} HP`;
        checkoutPrice.textContent = `$${Number(selectedPackObj.price).toFixed(2)}`;

        checkoutModal.classList.add('active');
      });
    }

    // Dismiss order checkout modal
    cancelBtn.addEventListener('click', () => {
      checkoutModal.classList.remove('active');
    });

    // Process order deduction and power credit
    confirmBtn.addEventListener('click', () => {
      if (!selectedPackObj) return;

      const price = parseFloat(selectedPackObj.price);
      const powerReward = parseInt(selectedPackObj.power);

      checkoutModal.classList.remove('active');
      confirmBtn.disabled = true;

      // Balance Transaction check
      const userRef = db.ref(`Users/${currentUser.uid}`);
      userRef.transaction((curr) => {
        if (curr) {
          if (parseFloat(curr.balance) < price) {
            // Cancel order: insufficient funds
            return;
          }
          curr.balance = parseFloat(curr.balance) - price;
          curr.power = (curr.power || 1000) + powerReward;
        }
        return curr;
      }, (error, committed) => {
        if (error) {
          showToast("Network mismatch. order aborted.");
          confirmBtn.disabled = false;
        } else if (!committed) {
          showToast("Checkout aborted: Insufficient available balance.");
          confirmBtn.disabled = false;
        } else {
          showToast(`Success! Purchased ${selectedPackObj.title}. +${Number(powerReward).toLocaleString()} HP credited!`, "success");
          confirmBtn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
