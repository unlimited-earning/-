<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TNMINING - Upgrade Hashrate</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #020009;
      --bg-secondary: #09041a;
      --bg-card: rgba(13, 6, 30, 0.65);
      --border-color: rgba(168, 85, 247, 0.18);
      --primary: #a855f7;
      --secondary: #06b6d4;
      --gold: #fbbf24;
      --gold-glow: rgba(251, 191, 36, 0.35);
      --primary-glow: rgba(168, 85, 247, 0.3);
      --secondary-glow: rgba(6, 182, 212, 0.2);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --radius-premium: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-primary);
      background-image: 
        radial-gradient(circle at 50% -20%, var(--primary-glow) 0%, transparent 60%),
        radial-gradient(circle at 10% 100%, var(--secondary-glow) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 95px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 16px;
      opacity: 0;
      transform: translateY(15px);
      animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade-in-up {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Page Header */
    .page-header {
      text-align: center;
      margin-bottom: 20px;
      padding-top: 10px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .page-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Available balance and stats banner */
    .balance-banner {
      background: rgba(13, 6, 31, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .bal-label-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .bal-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .bal-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--secondary);
    }

    .power-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14.5px;
      font-weight: 700;
      color: var(--primary);
    }

    /* Packages listings block */
    .packages-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .package-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 22px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .package-card:hover {
      border-color: var(--secondary);
      transform: translateY(-2px);
    }

    .package-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .package-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-main);
    }

    .package-badge {
      font-size: 10px;
      font-weight: 800;
      color: var(--secondary);
      background: rgba(6, 182, 212, 0.08);
      border: 1px solid rgba(6, 182, 212, 0.2);
      padding: 2px 10px;
      border-radius: 12px;
    }

    .package-power {
      font-size: 24px;
      font-family: 'Share Tech Mono', monospace;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .yield-blueprint {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 14px;
      padding: 10px 14px;
      margin-bottom: 18px;
    }

    .yield-row {
      display: flex;
      justify-content: space-between;
      font-size: 11.5px;
      padding: 4px 0;
      color: var(--text-muted);
    }

    .yield-val {
      font-weight: 600;
      color: var(--text-main);
    }

    .package-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    .price-tag {
      display: flex;
      flex-direction: column;
    }

    .price-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
    }

    .price-val {
      font-size: 18px;
      font-family: 'Share Tech Mono', monospace;
      font-weight: 700;
      color: #fff;
    }

    .btn-purchase {
      flex: 1;
      padding: 12.5px;
      border: none;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.25);
      transition: all 0.2s ease;
    }

    .btn-purchase:active {
      transform: scale(0.97);
    }

    /* Premium Coming Soon placeholder (Default Behavior) */
    .coming-soon-card {
      background: var(--bg-card);
      border: 1.5px dashed var(--border-color);
      border-radius: var(--radius-premium);
      padding: 50px 24px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      animation: float-card 3.5s infinite ease-in-out;
    }

    @keyframes float-card {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .coming-soon-icon {
      font-size: 40px;
      color: rgba(168, 85, 247, 0.4);
      margin-bottom: 16px;
    }

    .coming-soon-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .coming-soon-subtitle {
      font-size: 11.5px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Checkout verification modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 2, 12, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      width: 100%;
      max-width: 380px;
      padding: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 12px;
      text-align: center;
    }

    .modal-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 12.5px;
    }

    .modal-detail-row:last-of-type {
      border-bottom: none;
      margin-bottom: 18px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .btn-modal {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      border: none;
    }

    .btn-cancel { background: rgba(255, 255, 255, 0.05); color: var(--text-main); border: 1px solid var(--border-color); }
    .btn-confirm { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: #fff; }

    /* Skeleton Loading system */
    .skeleton-box {
      height: 120px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }

    .skeleton-box::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      transform: translateX(-100%);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }

    /* Bottom Navigation Bar Styles */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: rgba(5, 2, 15, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(168, 85, 247, 0.12);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 999;
      padding: 0 10px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-muted);
      width: 60px;
      transition: all 0.2s ease;
    }

    .nav-item i { font-size: 19px; }
    .nav-item span { font-size: 10px; font-weight: 500; }
    .nav-item.active { color: var(--primary); }

    .nav-item-mining {
      position: relative;
      top: -16px;
      width: 62px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff !important;
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4);
      border: 4.5px solid var(--bg-primary);
    }

    .nav-item-mining i { font-size: 22px; }

    /* Toasts Alerts */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(18, 10, 36, 0.95);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 12px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast.show { transform: translateX(0); }
    .toast.error { border-left: 4px solid var(--error); }
    .toast.success { border-left: 4px solid var(--success); }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Title Area -->
    <div class="page-header">
      <h1 class="page-title">Marketplace Nodes</h1>
      <p class="page-subtitle">Deploy premium hashrate hardware permanently linked to your profile</p>
    </div>

    <!-- Available balance overview -->
    <div class="balance-banner">
      <div class="bal-label-col">
        <span class="bal-label">Withdrawable Funds</span>
        <span class="bal-val" id="localBalanceDisplay">$0.00000000</span>
      </div>
      <div class="bal-label-col" style="text-align: right;">
        <span class="bal-label">Current total power</span>
        <span class="power-val" id="localPowerDisplay">0 HP</span>
      </div>
    </div>

    <!-- Skeleton Loading stack -->
    <div class="packages-stack" id="skeletonContainer">
      <div class="skeleton-box"></div>
      <div class="skeleton-box"></div>
    </div>

    <!-- Dynamic Packages Directory (Muted Coming Soon state default) -->
    <div class="packages-stack" id="packagesContainer" style="display:none;">
      <!-- Generated dynamically in script, default is "Coming Soon" card -->
    </div>

  </div>

  <!-- Payout confirmation modal overlay -->
  <div class="modal-overlay" id="checkoutModal">
    <div class="modal-card">
      <h3 class="modal-title">Confirm Node Deployment</h3>
      
      <div class="modal-detail-row">
        <span class="modal-label">Hashing Hardware</span>
        <span class="modal-val" id="checkoutTitle">-</span>
      </div>
      <div class="modal-detail-row">
        <span class="modal-label">Power Credit</span>
        <span class="modal-val" id="checkoutPower">-</span>
      </div>
      <div class="modal-detail-row">
        <span class="modal-label">Deduction Cost</span>
        <span class="modal-val" id="checkoutPrice">-</span>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-modal btn-cancel" id="cancelBtn">Cancel</button>
        <button type="button" class="btn-modal btn-confirm" id="confirmBtn">Complete Purchase</button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation Menu -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="task.html" class="nav-item">
      <i class="fa-solid fa-list-check"></i>
      <span>Tasks</span>
    </a>
    <a href="mining.html" class="nav-item-mining">
      <i class="fa-solid fa-circle-notch"></i>
    </a>
    <a href="referral.html" class="nav-item">
      <i class="fa-solid fa-user-group"></i>
      <span>Referral</span>
    </a>
    <a href="account.html" class="nav-item">
      <i class="fa-solid fa-user"></i>
      <span>Account</span>
    </a>
  </nav>

  <!-- Notification Alerts -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDuQICVoC10i62PQMS6cX37t1eoeTg5zsc",
      authDomain: "mining-c7b26.firebaseapp.com",
      databaseURL: "https://mining-c7b26-default-rtdb.firebaseio.com",
      projectId: "mining-c7b26",
      storageBucket: "mining-c7b26.firebasestorage.app",
      messagingSenderId: "873757658723",
      appId: "1:873757658723:web:18a4af95953a08b440b256"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();

    // DOM Elements
    const skeletonContainer = document.getElementById('skeletonContainer');
    const packagesContainer = document.getElementById('packagesContainer');
    const localBalanceDisplay = document.getElementById('localBalanceDisplay');
    const localPowerDisplay = document.getElementById('localPowerDisplay');

    // Checkout modal elements
    const checkoutModal = document.getElementById('checkoutModal');
    const checkoutTitle = document.getElementById('checkoutTitle');
    const checkoutPower = document.getElementById('checkoutPower');
    const checkoutPrice = document.getElementById('checkoutPrice');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const toastContainer = document.getElementById('toastContainer');

    let currentUser = null;
    let userData = null;
    let localBalance = 0;
    let globalPacksData = {};
    let selectedPackObj = null;

    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
      } else {
        currentUser = user;
        bindUserMetrics();
        bindDynamicPackagesPlatform();
      }
    });

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.classList.add('toast', type);
      const icon = type === 'success' ? 'fa-circle-check' : 'fa-triangle-exclamation';
      toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 50);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    function bindUserMetrics() {
      db.ref(`Users/${currentUser.uid}`).on('value', (snapshot) => {
        if (!snapshot.exists()) return;
        userData = snapshot.val();
        localBalance = parseFloat(userData.balance || 0);
        
        localBalanceDisplay.textContent = `$${localBalance.toFixed(8)}`;
        localPowerDisplay.textContent = `${Number(userData.power || 1000).toLocaleString()} HP`;
      });
    }

    // Connect packages store dynamically
    function bindDynamicPackagesPlatform() {
      db.ref('BuyPowerPackages').on('value', (snapshot) => {
        skeletonContainer.style.display = 'none';
        packagesContainer.style.display = 'flex';

        if (!snapshot.exists() || Object.keys(snapshot.val()).length === 0) {
          // Render Premium Coming Soon placeholder card (Default Behavior)
          packagesContainer.innerHTML = `
            <div class="coming-soon-card">
              <i class="fa-solid fa-hourglass-start coming-soon-icon"></i>
              <h4 class="coming-soon-title">Buy Power Coming Soon</h4>
              <p class="coming-soon-subtitle">Power packages will be available soon. The administrator is preparing mining packages.</p>
            </div>
          `;
          return;
        }

        globalPacksData = snapshot.val();
        renderPackagesMarketplace();
      });
    }

    function renderPackagesMarketplace() {
      const keys = Object.keys(globalPacksData);
      
      // Convert mapping array and sort by order index
      const packsArray = keys.map(key => globalPacksData[key]);
      packsArray.sort((a, b) => (a.displayOrder || 0) - (b.displayOrder || 0));

      let packsHTML = "";

      packsArray.forEach((pack) => {
        // Skip disabled products
        if (pack.enabled === false) return;

        const badgeClass = pack.badge ? pack.badge.toLowerCase() : "standard";
        const iconClass = pack.icon ? pack.icon : "fa-cube";

        packsHTML += `
          <div class="package-card" id="card_${pack.id}">
            <div class="package-header">
              <span class="package-title">${pack.name}</span>
              <span class="package-badge">${pack.badge || "Standard"}</span>
            </div>
            
            <div class="package-power">
              <i class="fa-solid ${iconClass}"></i> +${Number(pack.power).toLocaleString()} HP
            </div>

            <div class="yield-blueprint">
              <div class="yield-row"><span>Daily Income</span><span class="yield-val">+$${parseFloat(pack.dailyIncome || 0).toFixed(4)}</span></div>
              <div class="yield-row"><span>Monthly Income</span><span class="yield-val">+$${parseFloat(pack.monthlyIncome || 0).toFixed(4)}</span></div>
              <div class="yield-row"><span>Yearly Income</span><span class="yield-val">+$${parseFloat(pack.yearlyIncome || 0).toFixed(4)}</span></div>
            </div>

            <div class="package-footer">
              <div class="price-tag">
                <span class="price-label">Required Price</span>
                <span class="price-val">$${Number(pack.price).toFixed(2)}</span>
              </div>
              <button class="btn-purchase" onclick="openCheckoutModal('${pack.id}')">Purchase Node</button>
            </div>
          </div>
        `;
      });

      packagesContainer.innerHTML = packsHTML || `
        <div class="coming-soon-card">
          <i class="fa-solid fa-hourglass-start coming-soon-icon"></i>
          <h4 class="coming-soon-title">No Active Products Listed</h4>
          <p class="coming-soon-subtitle">Our servers are being configured. New nodes appear soon!</p>
        </div>
      `;
    }

    window.openCheckoutModal = function(packId) {
      selectedPackObj = globalPacksData[packId];
      if (!selectedPackObj) return;

      checkoutTitle.textContent = selectedPackObj.name;
      checkoutPower.textContent = `+${Number(selectedPackObj.power).toLocaleString()} HP`;
      checkoutPrice.textContent = `$${Number(selectedPackObj.price).toFixed(2)}`;

      checkoutModal.classList.add('active');
    };

    cancelBtn.addEventListener('click', () => {
      checkoutModal.classList.remove('active');
    });

    // Handle complete purchase and automatic 20% referrer affiliate reward credits
    confirmBtn.addEventListener('click', () => {
      if (!selectedPackObj) return;

      const price = parseFloat(selectedPackObj.price);
      const powerCredited = parseInt(selectedPackObj.power);

      checkoutModal.classList.remove('active');
      confirmBtn.disabled = true;

      // Deduct client-side balances transaction check
      const userRef = db.ref(`Users/${currentUser.uid}`);
      userRef.transaction((curr) => {
        if (curr) {
          if (parseFloat(curr.balance) < price) {
            return; // Abort: insufficient funds
          }
          curr.balance = parseFloat(curr.balance) - price;
          curr.power = (curr.power || 1000) + powerCredited;
        }
        return curr;
      }, async (error, committed) => {
        if (error) {
          showToast("Network mismatch error.", "error");
          confirmBtn.disabled = false;
        } else if (!committed) {
          showToast("Checkout aborted: Insufficient available withdrawable balance.", "error");
          confirmBtn.disabled = false;
        } else {
          showToast(`Success! Purchased ${selectedPackObj.name}. +${Number(powerCredited).toLocaleString()} HP added to permanent available hashrate!`, "success");
          confirmBtn.disabled = false;

          // Process 20% Affiliate commission (Rule 5)
          const referrerUid = userData.referredBy;
          if (referrerUid) {
            const commissionHP = Math.floor(powerCredited * 0.20); // 20% POWER
            
            // 1. Send the 20% Power permanently to Referrer profile
            const referrerProfileRef = db.ref(`Users/${referrerUid}`);
            await referrerProfileRef.transaction((refUser) => {
              if (refUser) {
                refUser.power = (refUser.power || 1000) + commissionHP;
              }
              return refUser;
            });

            // 2. Accumulate in Referral connections claims logs
            const referrerLogsRef = db.ref(`Referrals/${referrerUid}/${currentUser.uid}`);
            await referrerLogsRef.transaction((refLog) => {
              if (refLog) {
                refLog.commissionsGained = (parseInt(refLog.commissionsGained) || 0) + commissionHP;
              }
              return refLog;
            });
          }
        }
      });
    });
  </script>
</body>
</html>
