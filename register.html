<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TNMINING - Create Account</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #05020c;
      --bg-secondary: #0d061f;
      --bg-card: rgba(18, 10, 36, 0.65);
      --border-color: rgba(168, 85, 247, 0.2);
      --border-focus: rgba(6, 182, 212, 0.6);
      --primary: #a855f7;
      --secondary: #06b6d4;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --error: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-primary);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.12) 0%, transparent 40%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 30px 25px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                  0 0 40px rgba(168, 85, 247, 0.1);
      position: relative;
      z-index: 1;
      margin: 20px 0;
    }

    .brand-section {
      text-align: center;
      margin-bottom: 25px;
    }

    .brand-logo-placeholder {
      width: 60px;
      height: 60px;
      margin: 0 auto 10px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
    }

    .brand-logo-placeholder i {
      font-size: 28px;
      color: #fff;
    }

    .brand-name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1.5px;
      background: linear-gradient(to right, #ffffff, #a855f7, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-tagline {
      font-size: 13px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 18px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      margin-left: 4px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 15px;
      transition: color 0.3s ease;
    }

    .form-input {
      width: 100%;
      padding: 13px 16px 13px 46px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      border-color: var(--border-focus);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
    }

    .form-input:focus + i {
      color: var(--secondary);
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.3s;
    }

    .password-toggle:hover {
      color: var(--text-main);
    }

    .bonus-banner {
      background: rgba(168, 85, 247, 0.12);
      border: 1px dashed var(--primary);
      border-radius: 12px;
      padding: 10px 15px;
      text-align: center;
      margin-bottom: 20px;
      font-size: 13px;
      color: #dfc2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .bonus-banner i {
      color: #f59e0b;
      font-size: 15px;
    }

    .terms-container {
      display: flex;
      align-items: flex-start;
      cursor: pointer;
      user-select: none;
      color: var(--text-muted);
      font-size: 12.5px;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .terms-container input {
      display: none;
    }

    .checkmark {
      width: 18px;
      height: 18px;
      border: 1px solid var(--border-color);
      border-radius: 5px;
      margin-right: 10px;
      margin-top: 2px;
      display: inline-block;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s ease;
    }

    .terms-container input:checked + .checkmark {
      background: var(--primary);
      border-color: var(--primary);
    }

    .terms-container input:checked + .checkmark::after {
      content: "\f00c";
      font-family: "Font Awesome 5 Free";
      font-weight: 900;
      color: #fff;
      font-size: 10px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.35);
      transition: all 0.3s ease;
      position: relative;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(168, 85, 247, 0.5);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-submit .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      position: absolute;
      left: 50%;
      top: 50%;
      margin-left: -10px;
      margin-top: -10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .auth-footer {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      margin-left: 5px;
      transition: opacity 0.2s;
    }

    .auth-footer a:hover {
      text-decoration: underline;
      opacity: 0.9;
    }

    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(18, 10, 36, 0.95);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 12px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast.show { transform: translateX(0); }
    .toast.error { border-left: 4px solid var(--error); }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error i { color: var(--error); }
    .toast.success i { color: var(--success); }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="brand-section">
      <div class="brand-logo-placeholder">
        <i class="fa-solid fa-user-plus"></i>
      </div>
      <h1 class="brand-name">TNMINING</h1>
      <p class="brand-tagline">Create your cloud mining account</p>
    </div>

    <div class="bonus-banner">
      <i class="fa-solid fa-gift"></i>
      <span>Registration Bonus: <strong>+1,000 POWER</strong> instantly!</span>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label" for="regUsername">Username</label>
        <div class="input-wrapper">
          <input type="text" id="regUsername" class="form-input" placeholder="Choose a unique username" minlength="4" maxlength="15" required autocomplete="off">
          <i class="fa-solid fa-user"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="regEmail">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="regEmail" class="form-input" placeholder="Enter valid email" required autocomplete="email">
          <i class="fa-solid fa-envelope"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="regPassword">Password</label>
        <div class="input-wrapper">
          <input type="password" id="regPassword" class="form-input" placeholder="Min. 6 characters" minlength="6" required autocomplete="new-password">
          <i class="fa-solid fa-lock"></i>
          <i class="fa-solid fa-eye password-toggle" id="togglePassword"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="regConfirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="regConfirmPassword" class="form-input" placeholder="Repeat your password" minlength="6" required autocomplete="new-password">
          <i class="fa-solid fa-lock"></i>
          <i class="fa-solid fa-eye password-toggle" id="toggleConfirmPassword"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="referralCode">Referral Code (Optional)</label>
        <div class="input-wrapper">
          <input type="text" id="referralCode" class="form-input" placeholder="Enter referral code">
          <i class="fa-solid fa-users"></i>
        </div>
      </div>

      <label class="terms-container">
        <input type="checkbox" id="termsAgree" required>
        <span class="checkmark"></span>
        I agree to the TNMINING Terms of Service and Privacy Policy.
      </label>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">Create Account</span>
        <div class="spinner" id="btnSpinner"></div>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="index.html">Sign In</a>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDuQICVoC10i62PQMS6cX37t1eoeTg5zsc",
      authDomain: "mining-c7b26.firebaseapp.com",
      databaseURL: "https://mining-c7b26-default-rtdb.firebaseio.com",
      projectId: "mining-c7b26",
      storageBucket: "mining-c7b26.firebasestorage.app",
      messagingSenderId: "873757658723",
      appId: "1:873757658723:web:18a4af95953a08b440b256"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();

    const registerForm = document.getElementById('registerForm');
    const usernameInput = document.getElementById('regUsername');
    const emailInput = document.getElementById('regEmail');
    const passwordInput = document.getElementById('regPassword');
    const confirmPasswordInput = document.getElementById('regConfirmPassword');
    const refCodeInput = document.getElementById('referralCode');
    const termsAgree = document.getElementById('termsAgree');
    
    const togglePassword = document.getElementById('togglePassword');
    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const btnText = submitBtn.querySelector('.btn-text');
    const toastContainer = document.getElementById('toastContainer');

    function showToast(message, type = 'error') {
      const toast = document.createElement('div');
      toast.classList.add('toast', type);
      const icon = type === 'success' ? 'fa-circle-check' : 'fa-triangle-exclamation';
      toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 50);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    togglePassword.addEventListener('click', () => {
      passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
      togglePassword.classList.toggle('fa-eye');
      togglePassword.classList.toggle('fa-eye-slash');
    });

    toggleConfirmPassword.addEventListener('click', () => {
      confirmPasswordInput.type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
      toggleConfirmPassword.classList.toggle('fa-eye');
      toggleConfirmPassword.classList.toggle('fa-eye-slash');
    });

    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const refCode = urlParams.get('ref');
      if (refCode) {
        refCodeInput.value = refCode;
        refCodeInput.readOnly = true;
      }
      auth.onAuthStateChanged((user) => {
        if (user) window.location.href = 'home.html';
      });
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = usernameInput.value.trim().toLowerCase();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      const refCode = refCodeInput.value.trim();

      const usernameRegex = /^[a-zA-Z0-9_]{4,15}$/;
      if (!usernameRegex.test(username)) {
        showToast("Username must be 4-15 alphanumeric characters.");
        return;
      }

      if (password !== confirmPassword) {
        showToast("Passwords do not match.");
        return;
      }

      if (!termsAgree.checked) {
        showToast("Please agree to the Terms of Service.");
        return;
      }

      submitBtn.disabled = true;
      btnSpinner.style.display = 'block';
      btnText.style.opacity = '0.3';

      try {
        const usernameSnap = await db.ref('Users').orderByChild('username').equalTo(username).once('value');
        if (usernameSnap.exists()) {
          showToast("Username is already taken.");
          resetButton();
          return;
        }

        let referrerUid = "";
        if (refCode) {
          const refSnap = await db.ref(`Users/${refCode}`).once('value');
          if (refSnap.exists() && refCode !== "") {
            referrerUid = refCode;
          } else {
            showToast("Invalid referral code. Registering without referral.");
          }
        }

        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        const userData = {
          uid: user.uid,
          username: username,
          email: email,
          balance: 0.0000,
          power: 1000, 
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          banned: false,
          referredBy: referrerUid || "",
          referralsCount: 0,
          completedMiningCycles: 0, // Track claimed mining cycles
          miningStatus: "idle",
          miningStartTime: 0,
          totalEarnings: 0
        };

        await db.ref(`Users/${user.uid}`).set(userData);

        if (referrerUid) {
          // Log reference log mapping with custom properties
          await db.ref(`Referrals/${referrerUid}/${user.uid}`).set({
            username: username,
            registeredAt: firebase.database.ServerValue.TIMESTAMP,
            powerGained: 1000, // Expected Base reward 1,000 HP
            status: "Pending",
            miningCyclesCompleted: 0,
            bonus2kClaimed: false
          });
        }

        showToast("Registration successful!", "success");
        setTimeout(() => {
          window.location.href = 'home.html';
        }, 1200);

      } catch (error) {
        let errorMsg = error.message;
        if (error.code === 'auth/email-already-in-use') {
          errorMsg = "Email already in use.";
        }
        showToast(errorMsg, "error");
        resetButton();
      }
    });

    function resetButton() {
      submitBtn.disabled = false;
      btnSpinner.style.display = 'none';
      btnText.style.opacity = '1';
    }
  </script>
</body>
</html>
